<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CertifiedIQ CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f1ea;
    --bg-elevated: #fbf9f4;
    --bg-sunken: #ece8df;
    --ink: #1c1a17;
    --ink-soft: #4a4640;
    --ink-muted: #8b8680;
    --line: #d8d2c4;
    --line-soft: #e6e1d4;
    --accent: #b8431a;
    --accent-soft: #f0d4c4;
    --emerald: #1f6b3f;
    --emerald-soft: #d0e5d8;
    --gold: #a87d1e;
    --gold-soft: #f0e2b8;
    --rose: #9b2c4f;
    --rose-soft: #f0d4dc;
    --blue: #2a5a8a;
    --blue-soft: #d4dfeb;
    --shadow: 0 1px 2px rgba(28,26,23,0.04), 0 8px 24px rgba(28,26,23,0.06);
    --shadow-lg: 0 4px 12px rgba(28,26,23,0.08), 0 24px 48px rgba(28,26,23,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Geist', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  .serif { font-family: 'Instrument Serif', Georgia, serif; font-weight: 400; }
  .mono { font-family: 'Geist Mono', monospace; }
  /* ============= LAYOUT ============= */
  .app {
    display: grid;
    grid-template-columns: 240px 1fr;
    min-height: 100vh;
  }
  .sidebar {
    background: var(--ink);
    color: var(--bg);
    padding: 28px 20px;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }
  .brand {
    font-family: 'Instrument Serif', serif;
    font-size: 38px;
    line-height: 1;
    letter-spacing: -0.02em;
    margin-bottom: 4px;
  }
  .brand .dot { color: var(--accent); }
  .brand-sub {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: rgba(244,241,234,0.5);
    margin-bottom: 36px;
  }
  .nav { display: flex; flex-direction: column; gap: 2px; flex: 1; }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 6px;
    cursor: pointer;
    color: rgba(244,241,234,0.7);
    font-size: 13px;
    font-weight: 500;
    transition: all 0.15s;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
  }
  .nav-item:hover { background: rgba(244,241,234,0.06); color: var(--bg); }
  .nav-item.active { background: rgba(244,241,234,0.1); color: var(--bg); }
  .nav-item.active .nav-dot { background: var(--accent); }
  .nav-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(244,241,234,0.25);
  }
  .nav-section {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: rgba(244,241,234,0.35);
    padding: 16px 12px 6px;
  }
  .sidebar-foot {
    padding-top: 20px;
    border-top: 1px solid rgba(244,241,234,0.08);
    font-size: 11px;
    color: rgba(244,241,234,0.4);
    line-height: 1.6;
  }
  .status-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    margin-right: 6px;
    background: var(--emerald);
  }
  .status-dot.off { background: var(--rose); }
  /* ============= MAIN ============= */
  .main {
    padding: 32px 48px 80px;
    max-width: 1400px;
    width: 100%;
  }
  .page-head {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 36px;
    border-bottom: 1px solid var(--line);
    padding-bottom: 24px;
  }
  .page-title {
    font-family: 'Instrument Serif', serif;
    font-size: 52px;
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .page-title em { font-style: italic; color: var(--accent); }
  .page-sub {
    font-size: 13px;
    color: var(--ink-muted);
    margin-top: 8px;
    max-width: 540px;
  }
  .page-actions { display: flex; gap: 10px; }
  /* ============= BUTTONS / INPUTS ============= */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.15s;
    text-decoration: none;
    color: inherit;
    background: transparent;
  }
  .btn-primary {
    background: var(--ink);
    color: var(--bg);
  }
  .btn-primary:hover { background: #000; }
  .btn-primary:disabled { background: var(--ink-muted); cursor: not-allowed; }
  .btn-accent {
    background: var(--accent);
    color: white;
  }
  .btn-accent:hover { background: #9a3815; }
  .btn-ghost {
    border-color: var(--line);
    color: var(--ink-soft);
  }
  .btn-ghost:hover { background: var(--bg-elevated); border-color: var(--ink-muted); }
  .btn-danger { color: var(--rose); border-color: var(--line); }
  .btn-danger:hover { background: var(--rose-soft); border-color: var(--rose); }
  .input, .select, .textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--line);
    border-radius: 6px;
    font-family: inherit;
    font-size: 13px;
    background: var(--bg-elevated);
    color: var(--ink);
    transition: border-color 0.15s;
  }
  .input:focus, .select:focus, .textarea:focus {
    outline: none;
    border-color: var(--ink);
  }
  .textarea { resize: vertical; min-height: 80px; font-family: inherit; }
  .label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-muted);
    margin-bottom: 6px;
    font-weight: 600;
  }
  .form-row { margin-bottom: 18px; }
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
  }
  /* ============= CARDS ============= */
  .card {
    background: var(--bg-elevated);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 24px;
  }
  .card-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--line-soft);
  }
  .card-title {
    font-family: 'Instrument Serif', serif;
    font-size: 26px;
    line-height: 1;
  }
  .card-sub {
    font-size: 12px;
    color: var(--ink-muted);
    margin-top: 4px;
  }
  /* ============= DASHBOARD ============= */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }
  .stat-grid-5 { grid-template-columns: repeat(5, 1fr); }
  .stat {
    background: var(--bg-elevated);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }
  .stat-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-muted);
    font-weight: 600;
  }
  .stat-value {
    font-family: 'Instrument Serif', serif;
    font-size: 48px;
    line-height: 1;
    margin-top: 12px;
    letter-spacing: -0.02em;
  }
  .stat-value em { font-style: italic; color: var(--accent); }
  .stat-foot {
    font-size: 11px;
    color: var(--ink-muted);
    margin-top: 8px;
  }
  /* ============= TABLE ============= */
  .table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .table th {
    text-align: left;
    padding: 12px 14px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-muted);
    font-weight: 600;
    border-bottom: 1px solid var(--line);
    background: var(--bg-sunken);
  }
  .table td {
    padding: 14px;
    border-bottom: 1px solid var(--line-soft);
    vertical-align: middle;
  }
  .table tr:hover td { background: var(--bg-elevated); }
  .table tr.selectable { cursor: pointer; }
  .table .company { font-weight: 600; color: var(--ink); }
  .table .meta { font-size: 12px; color: var(--ink-muted); }
  /* ============= BADGES ============= */
  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 500;
    border: 1px solid;
  }
  .badge-initial { background: var(--blue-soft); color: var(--blue); border-color: var(--blue); }
  .badge-banta { background: var(--gold-soft); color: var(--gold); border-color: var(--gold); }
  .badge-call { background: var(--accent-soft); color: var(--accent); border-color: var(--accent); }
  .badge-response { background: #e8d9f0; color: #6b2c8a; border-color: #6b2c8a; }
  .badge-cta { background: var(--emerald-soft); color: var(--emerald); border-color: var(--emerald); }
  .badge-won { background: var(--emerald); color: white; border-color: var(--emerald); }
  .badge-lost { background: var(--rose-soft); color: var(--rose); border-color: var(--rose); }
  /* ============= KANBAN ============= */
  .kanban {
    display: flex;
    gap: 14px;
    overflow-x: auto;
    padding-bottom: 16px;
    min-height: 500px;
    scroll-behavior: smooth;
  }
  .kanban::-webkit-scrollbar { height: 10px; }
  .kanban::-webkit-scrollbar-track { background: var(--bg-sunken); border-radius: 5px; }
  .kanban::-webkit-scrollbar-thumb { background: var(--line); border-radius: 5px; }
  .kanban::-webkit-scrollbar-thumb:hover { background: var(--ink-muted); }
  .kanban-col {
    flex: 0 0 260px;
    background: var(--bg-sunken);
    border-radius: 8px;
    padding: 12px;
    border: 1px solid var(--line-soft);
    display: flex;
    flex-direction: column;
    max-height: 75vh;
    transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
    position: relative;
  }
  .kanban-col.drop-active {
    background: var(--bg-elevated);
    border-color: var(--ink);
    box-shadow: inset 0 0 0 2px var(--ink);
  }
  .kanban-col-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 8px 12px;
    border-bottom: 2px solid;
    margin-bottom: 10px;
  }
  .kanban-col-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-weight: 600;
    color: var(--ink);
  }
  .kanban-col-count {
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    background: var(--bg-elevated);
    border: 1px solid var(--line);
    padding: 2px 8px;
    border-radius: 100px;
    color: var(--ink-muted);
    font-weight: 500;
  }
  .kanban-cards {
    flex: 1;
    overflow-y: auto;
    padding: 0 4px;
    margin: 0 -4px;
    min-height: 60px;
  }
  .kanban-cards::-webkit-scrollbar { width: 6px; }
  .kanban-cards::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }
  .kanban-card {
    background: var(--bg-elevated);
    border: 1px solid var(--line);
    border-left-width: 4px;
    border-radius: 6px;
    padding: 12px 14px;
    margin-bottom: 8px;
    cursor: grab;
    transition: box-shadow 0.15s, transform 0.15s, opacity 0.15s;
    user-select: none;
  }
  .kanban-card:hover {
    box-shadow: var(--shadow);
    transform: translateY(-1px);
  }
  .kanban-card:active { cursor: grabbing; }
  .kanban-card.dragging {
    opacity: 0.4;
    cursor: grabbing;
  }
  .kanban-card-company {
    font-weight: 600;
    font-size: 13px;
    color: var(--ink);
    line-height: 1.3;
  }
  .kanban-card-contact {
    font-size: 11px;
    color: var(--ink-muted);
    margin-top: 3px;
  }
  .kanban-card-meta {
    display: flex;
    gap: 6px;
    margin-top: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  .kanban-card-pill {
    font-size: 10px;
    padding: 2px 8px;
    background: var(--bg-sunken);
    border: 1px solid var(--line);
    border-radius: 100px;
    color: var(--ink-soft);
  }
  .kanban-card-days {
    font-size: 10px;
    color: var(--ink-muted);
    font-family: 'Geist Mono', monospace;
    margin-left: auto;
  }
  .kanban-card-days.stale { color: var(--rose); }
  .kanban-empty {
    padding: 16px 8px;
    font-size: 12px;
    color: var(--ink-muted);
    text-align: center;
    font-style: italic;
    border: 1px dashed var(--line);
    border-radius: 6px;
  }
  .view-toggle {
    display: inline-flex;
    border: 1px solid var(--line);
    border-radius: 6px;
    overflow: hidden;
  }
  .view-toggle button {
    padding: 8px 14px;
    background: var(--bg-elevated);
    border: none;
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    color: var(--ink-soft);
    transition: background 0.15s;
  }
  .view-toggle button.active {
    background: var(--ink);
    color: var(--bg);
  }
  .view-toggle button:not(.active):hover { background: var(--bg-sunken); }
  /* ============= GANTT ============= */
  .gantt-wrap {
    background: var(--bg-elevated);
    border: 1px solid var(--line);
    border-radius: 8px;
    overflow: hidden;
  }
  .gantt-head {
    display: grid;
    grid-template-columns: 240px 1fr;
    border-bottom: 1px solid var(--line);
    background: var(--bg-sunken);
  }
  .gantt-row {
    display: grid;
    grid-template-columns: 240px 1fr;
    border-bottom: 1px solid var(--line-soft);
    min-height: 56px;
  }
  .gantt-row:hover { background: var(--bg-elevated); }
  .gantt-name {
    padding: 12px 16px;
    border-right: 1px solid var(--line-soft);
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .gantt-name .company { font-weight: 600; font-size: 13px; }
  .gantt-name .meta { font-size: 11px; color: var(--ink-muted); margin-top: 2px; }
  .gantt-timeline {
    position: relative;
    display: flex;
    align-items: center;
    padding: 8px 0;
    min-height: 56px;
  }
  .gantt-date-axis {
    display: grid;
    border-bottom: 1px solid var(--line);
    background: var(--bg-sunken);
  }
  .gantt-date-col {
    padding: 8px 4px;
    text-align: center;
    border-right: 1px solid var(--line-soft);
    font-size: 10px;
    color: var(--ink-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .gantt-grid {
    position: absolute;
    inset: 0;
    display: grid;
    pointer-events: none;
  }
  .gantt-grid-col {
    border-right: 1px dashed var(--line-soft);
  }
  .gantt-bar {
    position: absolute;
    height: 28px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    padding: 0 8px;
    font-size: 11px;
    font-weight: 500;
    overflow: hidden;
    cursor: grab;
    transition: transform 0.15s, box-shadow 0.15s;
    white-space: nowrap;
    user-select: none;
    -webkit-user-select: none;
  }
  .gantt-bar:hover {
    transform: translateY(-1px);
    box-shadow: var(--shadow);
    z-index: 2;
  }
  .gantt-bar.dragging {
    cursor: grabbing;
    transition: none;
    z-index: 10;
    box-shadow: var(--shadow-lg);
    opacity: 0.9;
  }
  .gantt-bar-handle {
    position: absolute;
    right: -3px;
    top: 0;
    bottom: 0;
    width: 8px;
    cursor: ew-resize;
    background: transparent;
    z-index: 3;
  }
  .gantt-bar-handle::after {
    content: '';
    position: absolute;
    right: 2px;
    top: 50%;
    transform: translateY(-50%);
    width: 2px;
    height: 14px;
    background: currentColor;
    opacity: 0;
    border-radius: 2px;
    transition: opacity 0.15s;
  }
  .gantt-bar-handle:hover::after { opacity: 0.6; }
  .gantt-drag-tooltip {
    position: fixed;
    background: var(--ink);
    color: var(--bg);
    padding: 6px 10px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
    pointer-events: none;
    z-index: 1000;
    transform: translate(-50%, calc(-100% - 8px));
    box-shadow: var(--shadow-lg);
    white-space: nowrap;
  }
  .gantt-drag-tooltip::after {
    content: '';
    position: absolute;
    left: 50%;
    bottom: -4px;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 4px solid transparent;
    border-right: 4px solid transparent;
    border-top: 4px solid var(--ink);
  }
  .gantt-bar.s-initial { background: var(--blue-soft); color: var(--blue); border: 1px solid var(--blue); }
  .gantt-bar.s-banta { background: var(--gold-soft); color: var(--gold); border: 1px solid var(--gold); }
  .gantt-bar.s-call { background: var(--accent-soft); color: var(--accent); border: 1px solid var(--accent); }
  .gantt-bar.s-response { background: #e8d9f0; color: #6b2c8a; border: 1px solid #6b2c8a; }
  .gantt-bar.s-cta { background: var(--emerald-soft); color: var(--emerald); border: 1px solid var(--emerald); }
  .gantt-bar.s-won { background: var(--emerald); color: white; border: 1px solid var(--emerald); }
  .gantt-bar.s-lost { background: var(--rose-soft); color: var(--rose); border: 1px solid var(--rose); }
  /* ============= LEAD DETAIL ============= */
  .detail-grid {
    display: grid;
    grid-template-columns: 1.4fr 1fr;
    gap: 24px;
  }
  .pitch-block {
    background: var(--ink);
    color: var(--bg);
    border-radius: 8px;
    padding: 28px;
    position: relative;
    overflow: hidden;
  }
  .pitch-block::before {
    content: '"';
    position: absolute;
    font-family: 'Instrument Serif', serif;
    font-size: 200px;
    top: -40px; right: 20px;
    color: rgba(244,241,234,0.06);
    line-height: 1;
  }
  .pitch-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: rgba(244,241,234,0.5);
    margin-bottom: 16px;
  }
  .pitch-text {
    font-family: 'Instrument Serif', serif;
    font-size: 22px;
    line-height: 1.4;
    position: relative;
  }
  .research-section { margin-bottom: 24px; }
  .research-section h4 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-muted);
    margin-bottom: 8px;
    font-weight: 600;
  }
  .research-section p {
    font-size: 13px;
    line-height: 1.6;
    color: var(--ink-soft);
  }
  .research-section ul { padding-left: 20px; font-size: 13px; color: var(--ink-soft); }
  .research-section li { margin-bottom: 4px; }
  /* ============= TIMELINE ============= */
  .timeline { padding-left: 8px; }
  .timeline-item {
    position: relative;
    padding-left: 24px;
    padding-bottom: 20px;
    border-left: 2px solid var(--line);
  }
  .timeline-item:last-child { border-left-color: transparent; padding-bottom: 0; }
  .timeline-dot {
    position: absolute;
    left: -7px;
    top: 2px;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--bg);
    border: 2px solid var(--accent);
  }
  .timeline-date { font-size: 11px; color: var(--ink-muted); }
  .timeline-title { font-weight: 600; margin-top: 2px; font-size: 13px; }
  .timeline-body { font-size: 12px; color: var(--ink-soft); margin-top: 4px; }
  /* ============= LISTENER ============= */
  .listener-card {
    background: var(--ink);
    color: var(--bg);
    border-radius: 12px;
    padding: 32px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .mic-button {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: white;
    font-size: 32px;
    cursor: pointer;
    margin: 16px auto;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    position: relative;
  }
  .mic-button.recording {
    background: var(--rose);
    animation: pulse 1.5s infinite;
  }
  .mic-button:hover { transform: scale(1.05); }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(155,44,79,0.5); }
    50% { box-shadow: 0 0 0 16px rgba(155,44,79,0); }
  }
  .listener-status {
    font-size: 13px;
    color: rgba(244,241,234,0.6);
    margin-top: 8px;
  }
  .transcript {
    background: var(--bg-elevated);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 20px;
    margin-top: 20px;
    min-height: 200px;
    max-height: 400px;
    overflow-y: auto;
    font-size: 14px;
    line-height: 1.7;
    color: var(--ink);
    white-space: pre-wrap;
  }
  .transcript:empty::before {
    content: 'Transcript will appear here as you speak…';
    color: var(--ink-muted);
    font-style: italic;
  }
  .interim { color: var(--ink-muted); }
  /* ============= MODAL ============= */
  .modal-bg {
    position: fixed;
    inset: 0;
    background: rgba(28,26,23,0.5);
    backdrop-filter: blur(4px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 24px;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--bg-elevated);
    border-radius: 12px;
    width: 100%;
    max-width: 600px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
  }
  .modal-head {
    padding: 24px 28px;
    border-bottom: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal-body { padding: 28px; }
  .modal-foot {
    padding: 20px 28px;
    border-top: 1px solid var(--line);
    display: flex;
    justify-content: flex-end;
    gap: 10px;
  }
  /* ============= TOAST ============= */
  .toast-wrap {
    position: fixed;
    top: 24px;
    right: 24px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 1000;
  }
  .toast {
    background: var(--ink);
    color: var(--bg);
    padding: 12px 18px;
    border-radius: 6px;
    font-size: 13px;
    box-shadow: var(--shadow-lg);
    animation: slideIn 0.2s ease-out;
  }
  .toast.error { background: var(--rose); }
  .toast.success { background: var(--emerald); }
  @keyframes slideIn {
    from { transform: translateX(20px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }
  /* ============= MISC ============= */
  .empty {
    padding: 60px 20px;
    text-align: center;
    color: var(--ink-muted);
  }
  .empty .serif {
    font-size: 24px;
    color: var(--ink);
    margin-bottom: 8px;
  }
  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid currentColor;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ============= USER IDENTITY ============= */
  .user-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 6px;
    background: rgba(244,241,234,0.06);
    cursor: pointer;
    transition: background 0.15s;
    font-size: 12px;
    color: var(--bg);
  }
  .user-badge:hover { background: rgba(244,241,234,0.12); }
  .user-badge-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--ink-muted);
    flex-shrink: 0;
  }
  .user-badge-name { font-weight: 500; }
  .user-picker-modal {
    max-width: 480px;
    text-align: center;
  }
  .user-picker-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-top: 24px;
  }
  .user-picker-card {
    border: 2px solid var(--line);
    border-radius: 8px;
    padding: 28px 20px;
    cursor: pointer;
    transition: all 0.15s;
    background: var(--bg-elevated);
  }
  .user-picker-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow);
  }
  .user-picker-card .avatar {
    width: 56px; height: 56px;
    border-radius: 50%;
    margin: 0 auto 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-family: 'Instrument Serif', serif;
    font-size: 26px;
  }
  .user-picker-card .name {
    font-family: 'Instrument Serif', serif;
    font-size: 22px;
  }

  /* ============= OWNER PILL ============= */
  .owner-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 2px 9px 2px 6px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 500;
    border: 1px solid;
  }
  .owner-pill-dot {
    width: 7px; height: 7px; border-radius: 50%;
  }
  .owner-pill.unassigned {
    color: var(--ink-muted);
    border-color: var(--line);
    background: var(--bg-sunken);
  }

  /* ============= BANT PANEL ============= */
  .bant-card {
    border: 1px solid var(--line);
    border-left: 4px solid var(--gold);
    border-radius: 6px;
    padding: 14px;
    margin-bottom: 12px;
    background: var(--bg-elevated);
  }
  .bant-card-head {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .bant-letter {
    width: 28px; height: 28px;
    border-radius: 6px;
    background: var(--gold-soft);
    color: var(--gold);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Instrument Serif', serif;
    font-size: 18px;
    font-weight: 600;
  }
  .bant-label { font-weight: 600; font-size: 13px; flex: 1; }
  .bant-status-select {
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 11px;
    border: 1px solid var(--line);
    font-family: inherit;
    cursor: pointer;
    font-weight: 500;
    text-transform: capitalize;
  }
  .bant-prompt {
    font-size: 11px;
    color: var(--ink-muted);
    margin-bottom: 6px;
  }
  .bant-notes {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--line);
    border-radius: 4px;
    font-family: inherit;
    font-size: 12px;
    background: var(--bg);
    resize: vertical;
    min-height: 50px;
    color: var(--ink);
  }
  .bant-notes:focus { outline: none; border-color: var(--ink); }
  .bant-status-dots {
    display: inline-flex;
    gap: 4px;
    margin-left: 8px;
  }
  .bant-status-dot {
    width: 20px; height: 20px;
    border-radius: 4px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-family: 'Geist Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    border: 1px solid;
  }

  /* ============= QUALIFICATION CARD ============= */
  .qual-card {
    background: var(--bg-elevated);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .qual-card-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 16px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--line-soft);
  }
  .qual-card-company { font-family: 'Instrument Serif', serif; font-size: 22px; line-height: 1.1; }
  .qual-card-meta { font-size: 11px; color: var(--ink-muted); margin-top: 4px; }
  .qual-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .qual-actions {
    margin-top: 16px;
    padding-top: 14px;
    border-top: 1px solid var(--line-soft);
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  /* ============= ACTIVITY LOG ============= */
  .activity-row {
    display: grid;
    grid-template-columns: 110px 100px 1fr auto;
    gap: 14px;
    padding: 12px 14px;
    border-bottom: 1px solid var(--line-soft);
    align-items: center;
    font-size: 13px;
  }
  .activity-row:hover { background: var(--bg-elevated); cursor: pointer; }
  .activity-kind {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 100px;
    text-align: center;
    border: 1px solid;
  }
  .activity-kind.stage     { color: var(--accent);  border-color: var(--accent);  background: var(--accent-soft); }
  .activity-kind.owner     { color: var(--blue);    border-color: var(--blue);    background: var(--blue-soft); }
  .activity-kind.delete    { color: var(--rose);    border-color: var(--rose);    background: var(--rose-soft); }
  .activity-kind.create    { color: var(--emerald); border-color: var(--emerald); background: var(--emerald-soft); }
  .activity-kind.qualify   { color: var(--gold);    border-color: var(--gold);    background: var(--gold-soft); }
  .activity-time { font-size: 11px; color: var(--ink-muted); font-family: 'Geist Mono', monospace; }
  .activity-detail { color: var(--ink-soft); }
  .activity-detail strong { color: var(--ink); }

  /* ============= SHOW UNQUALIFIED TOGGLE ============= */
  .toggle-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 100px;
    border: 1px solid var(--line);
    font-size: 12px;
    background: var(--bg-elevated);
    cursor: pointer;
    color: var(--ink-soft);
    font-family: inherit;
  }
  .toggle-pill.on {
    border-color: var(--ink);
    background: var(--ink);
    color: var(--bg);
  }
  .toggle-pill .dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--ink-muted);
  }
  .toggle-pill.on .dot { background: var(--accent); }
  .hidden { display: none !important; }
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    background: var(--bg-sunken);
    border-radius: 100px;
    font-size: 11px;
    color: var(--ink-soft);
    border: 1px solid var(--line);
  }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  .toolbar {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    align-items: center;
    flex-wrap: wrap;
  }
  .toolbar .input, .toolbar .select { width: auto; min-width: 160px; }
  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .checkbox-row input { width: 16px; height: 16px; cursor: pointer; }
  details summary {
    cursor: pointer;
    font-size: 12px;
    color: var(--ink-muted);
    padding: 8px 0;
  }
  .warning {
    background: var(--gold-soft);
    border: 1px solid var(--gold);
    color: #6b4d10;
    padding: 12px 16px;
    border-radius: 6px;
    font-size: 12px;
    margin-bottom: 16px;
  }
  .warning strong { color: var(--gold); }
  @media (max-width: 980px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { position: relative; height: auto; }
    .main { padding: 24px; }
    .stat-grid { grid-template-columns: repeat(2, 1fr); }
    .stat-grid-5 { grid-template-columns: repeat(2, 1fr); }
    .detail-grid { grid-template-columns: 1fr; }
    .form-grid { grid-template-columns: 1fr; }
    .page-head { flex-direction: column; align-items: flex-start; gap: 16px; }
    .page-title { font-size: 36px; }
  }
  /* ============= LIVE COACHING PANEL ============= */
  .coach-layout { display: grid; grid-template-columns: 1fr 300px; gap: 20px; align-items: start; }
  @media (max-width: 980px) { .coach-layout { grid-template-columns: 1fr; } }
  .coach-panel { display: flex; flex-direction: column; gap: 14px; position: sticky; top: 24px; }
  .coach-tile { background: var(--bg-elevated); border: 1px solid var(--line); border-radius: 8px; padding: 14px 16px; }
  .coach-tile-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--ink-muted); font-weight: 600; margin-bottom: 8px; }
  .coach-bignum { font-family: 'Geist Mono', monospace; font-size: 30px; line-height: 1; color: var(--ink); }
  .coach-bignum.warn { color: var(--gold); }
  .coach-bignum.bad  { color: var(--rose); }
  .coach-sub { font-size: 11px; color: var(--ink-muted); margin-top: 6px; }
  .coach-chip-now { font-family: 'Instrument Serif', serif; font-size: 22px; line-height: 1.2; color: var(--accent); }
  .coach-chip-next { font-size: 11px; color: var(--ink-muted); margin-top: 6px; }
  .coach-check { display: flex; align-items: center; gap: 8px; font-size: 12px; padding: 5px 0; color: var(--ink-soft); }
  .coach-check .box { width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid var(--line); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; color: white; }
  .coach-check.done .box { background: var(--emerald); border-color: var(--emerald); }
  .coach-check.done { color: var(--ink); }
  .coach-nudge-out { font-size: 12px; line-height: 1.5; color: var(--ink); background: var(--bg-sunken); border-radius: 6px; padding: 10px 12px; margin-top: 10px; white-space: pre-wrap; }
</style>
</head>
<body>
<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="brand" style="font-size:28px;">CertifiedIQ<span style="font-style:italic; color:var(--accent);"> CRM</span></div>
    <div class="brand-sub">Pipeline &amp; outreach</div>
    <nav class="nav">
      <button class="nav-item active" data-page="dashboard"><span class="nav-dot"></span>Dashboard</button>
      <button class="nav-item" data-page="generate"><span class="nav-dot"></span>Generate Leads</button>
      <button class="nav-item" data-page="leads"><span class="nav-dot"></span>Leads</button>
      <button class="nav-item" data-page="qualification"><span class="nav-dot"></span>Qualification</button>
      <button class="nav-item" data-page="pipeline"><span class="nav-dot"></span>Pipeline</button>
      <button class="nav-item" data-page="followups"><span class="nav-dot"></span>Follow-ups</button>
      <button class="nav-item" data-page="listener"><span class="nav-dot"></span>Call Listener</button>
      <button class="nav-item" data-page="tutor"><span class="nav-dot"></span>Sales Tutor</button>
      <button class="nav-item" data-page="analytics"><span class="nav-dot"></span>Analytics</button>
      <button class="nav-item" data-page="activity"><span class="nav-dot"></span>Audit Log</button>
      <div class="nav-section">Configure</div>
      <button class="nav-item" data-page="playbook"><span class="nav-dot"></span>Playbook</button>
      <button class="nav-item" data-page="settings"><span class="nav-dot"></span>Settings</button>
    </nav>
    <div class="sidebar-foot">
      <div id="userBadge" class="user-badge" onclick="openUserSwitcher()" title="Click to switch user">
        <span class="user-badge-dot"></span>
        <span class="user-badge-name">— pick user —</span>
      </div>
      <div style="margin-top:12px;"><span class="status-dot off" id="connStatus"></span><span id="connText">Backend: not configured</span></div>
      <div style="margin-top:8px;">Data persists to your Google Sheet via Apps Script.</div>
      <div style="margin-top:10px; padding-top:10px; border-top:1px solid rgba(244,241,234,0.12); font-family:'Geist Mono', monospace; font-size:12px; opacity:0.9;">CertifiedIQ CRM <span id="versionStamp" style="color:var(--accent); font-weight:600;">v9.4.3</span></div>
      <div style="margin-top:10px; padding-top:10px; border-top:1px solid rgba(244,241,234,0.06);">
        <a href="https://github.com/dosca61/certifiediq-tools/blob/main/README.md" target="_blank" style="font-size:11px; color:rgba(244,241,234,0.6); text-decoration:none; display:inline-flex; align-items:center; gap:4px;">📖 Manual</a>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main" id="main"></main>
</div>

<!-- MODALS -->

  <div class="modal" id="modalContent"></div>
</div>

<div class="toast-wrap" id="toasts"></div>

<script>
/* ============================================================
   BACKEND
   Hard-wired to the team's Apps Script deployment.
   This URL always wins over anything cached in localStorage —
   a redeploy here forces every browser onto the new endpoint
   on next page load. To change endpoint, just edit this line.
   ============================================================ */
const BACKEND_URL = 'https://script.google.com/macros/s/AKfycbxlTG02N2FOM9Vo2kt4kTYcd80oNBAbRGtwn2I7PoUvgkkhf1ai9Lm5nLTuyx9mDSb28A/exec';

/* ============================================================
   STATE
   ============================================================ */
// Version stamp — shown in the sidebar foot. Bump on every release so the user
// can tell at a glance which build they're on without diffing files.
const VERSION = 'v9.4.3';

const STATE = {
  leads: [],
  calls: [],
  activities: [],
  changes: [],                // Audit trail: stage changes, owner changes, deletes, creates
  page: 'dashboard',
  selectedLeadId: null,
  _pipelineView: 'kanban',    // 'kanban' (default) or 'timeline'
  _showUnqualified: false,    // Pipeline: reveal Initial Contact + BANT leads
  _leadOwnerFilter: 'all',    // 'all' | 'mine' on Leads page
  _qualOwnerFilter: 'all',    // 'all' | 'mine' on Qualification page
  _activityFilter: 'all',     // 'all' | 'stage' | 'owner' | 'delete' | 'create'
  _followupOwnerFilter: 'all',// 'all' | 'mine' on Follow-ups page
  _followupKindFilter: 'all', // 'all' or one of FOLLOWUP_KINDS keys
  _followupLeadFilter: 'all', // 'all' or a lead id
  _followupShowDone: 10,      // how many done items to show on the Follow-ups page
  _analyticsScope: 'all',     // 'all' | 'mine' on Analytics page
  _analyticsRange: '90',      // '30' | '90' | '365' | 'all' (days)
  _genSource: 'apollo',       // 'apollo' (real leads) | 'regulator' (CSV ingest from HIQA/CIF/Bord Bia/Apollo Web) | 'claude' (honesty mode)
  _regulatorChoice: 'hiqa-older',  // which regulator template is selected
  _regulatorParsed: null,     // last parsed CSV rows (held in memory while user previews)
  currentUser: null,          // 'Donal' | 'Malcolm' | 'Rachel' — picked at first load
  config: {
    appsScriptUrl: BACKEND_URL,
    lastSync: null,
    playbook: null            // Loaded from localStorage or DEFAULT_PLAYBOOK on first run
  },
  recording: false,
  recognition: null,
  currentTranscript: '',
  interimTranscript: '',
  currentCallLeadId: null,
  _coachChats: {},            // { [callId]: [ {role:'user'|'assistant', text} ] } — in-memory only
  _tutorExpanded: {},         // { [callId]: bool } — which tutor-hub cards are open
  coach: { lastSpeechMs: 0, monologueStartMs: 0, chipIdx: 0, tickHandle: null, chipHandle: null, nudgeBusy: false }
};

// Two-person team. Identification, not authentication — pick yourself on first load.
const USERS = [
  { name: 'Donal',   colour: '#2a5a8a', soft: '#d4dfeb' },
  { name: 'Malcolm', colour: '#1f6b3f', soft: '#d0e5d8' },
  { name: 'Rachel',  colour: '#1e5e6e', soft: '#d0dfe2' }
];

// Rotating live reminders for the Call Listener coaching panel.
const COACH_CHIPS = [
  'Listen — let them talk',
  'Ask about their pain points',
  'Name a specific risk event',
  'Quantify the cost of inaction',
  'Ask who else signs off',
  'Lock in a clear next step'
];

function userColour(name) { const u = USERS.find(u => u.name === name); return u ? u.colour : '#8b8680'; }
function userSoft(name)   { const u = USERS.find(u => u.name === name); return u ? u.soft   : '#ece8df'; }

// BANT qualification criteria — pre-pipeline gate.
const BANT_CRITERIA = [
  { key: 'budget',    letter: 'B', label: 'Budget',    prompt: 'Can they afford it? Ballpark figure? Budget cycle position?' },
  { key: 'authority', letter: 'A', label: 'Authority', prompt: 'Decision-maker, influencer, or champion? Who else signs?' },
  { key: 'need',      letter: 'N', label: 'Need',      prompt: 'Specific pain point. Cite the regulator or risk event.' },
  { key: 'timing',    letter: 'T', label: 'Timing',    prompt: "When are they buying? What's driving the timeline?" }
];
const BANT_STATUSES = ['unknown', 'pass', 'concern', 'fail'];
function bantStatusColour(s) {
  return { pass: 'var(--emerald)', concern: 'var(--gold)', fail: 'var(--rose)', unknown: 'var(--ink-muted)' }[s] || 'var(--ink-muted)';
}
function bantStatusBg(s) {
  return { pass: 'var(--emerald-soft)', concern: 'var(--gold-soft)', fail: 'var(--rose-soft)', unknown: 'var(--bg-sunken)' }[s] || 'var(--bg-sunken)';
}

// Follow-up action types — manually-logged touchpoints (calls, visits, memos, etc).
// Each kind has a 2-letter monogram and a colour pair (border + soft fill) from the palette.
const FOLLOWUP_KINDS = [
  { key: 'phone',     label: 'Phone call', mono: 'PH', colour: 'var(--blue)',    soft: 'var(--blue-soft)' },
  { key: 'visit',     label: 'Visit',      mono: 'VS', colour: 'var(--emerald)', soft: 'var(--emerald-soft)' },
  { key: 'email',     label: 'Email',      mono: 'EM', colour: 'var(--gold)',    soft: 'var(--gold-soft)' },
  { key: 'memo',      label: 'Memo',       mono: 'MM', colour: 'var(--accent)',  soft: 'var(--accent-soft)' },
  { key: 'voicemail', label: 'Voicemail',  mono: 'VM', colour: '#6b2c8a',        soft: '#e8d9f0' },
  { key: 'linkedin',  label: 'LinkedIn',   mono: 'LI', colour: 'var(--rose)',    soft: 'var(--rose-soft)' },
  { key: 'other',     label: 'Other',      mono: 'OT', colour: 'var(--ink-soft)',soft: 'var(--bg-sunken)' }
];
function followupKind(key) { return FOLLOWUP_KINDS.find(k => k.key === key) || FOLLOWUP_KINDS[6]; }

// Regulator templates for the CSV-import "Regulator" lead source.
// Each entry maps a public source to suggested column auto-detection
// patterns and a default sector tag for ingested leads.
const REGULATORS = [
  {
    key: 'hiqa-older',
    label: 'HIQA — Designated Centres for Older People',
    sector: 'Homecare & Residential Care — HIQA',

/* ============================================================
   BACKEND CALLS (Google Apps Script)
   ============================================================ */
async function backendCall(action, payload, opts) {
  opts = opts || {};
  if (!STATE.config.appsScriptUrl) {
    throw new Error('Apps Script URL not configured. Go to Settings.');
  }
  const url = STATE.config.appsScriptUrl;
  // Inject current user (attribution) + shared backend token (auth).
  // The token is checked server-side against the PURSUIT_TOKEN Script
  // Property, so a leaked /exec URL alone can no longer read or write
  // data or burn API credits. The token lives only in localStorage,
  // never in this file -- this file is public on GitHub Pages.
  const token = opts.silent ? (localStorage.getItem('pursuit_token') || '') : getAuthToken(false);
  const enriched = Object.assign({}, payload || {}, { _user: STATE.currentUser || 'unknown', _token: token });
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ action, payload: enriched })
  });
  if (!res.ok) throw new Error('Backend error: ' + res.status);
  const data = await res.json();
  if (data.error === 'unauthorized') {
    if (!opts.silent && !opts._retried) {
      const fresh = getAuthToken(true);
      if (fresh) return backendCall(action, payload, Object.assign({}, opts, { _retried: true }));
    }
    throw new Error('Unauthorized: check the backend token in Settings');
  }
  if (data.error) throw new Error(data.error);
  return data;
}

/* ============================================================
   AUTH TOKEN + OFFLINE PUSH QUEUE (v9.2.0 hardening)
   - getAuthToken: shared team secret, entered once per browser,
     sent as _token on every call, verified by the backend.
   - Push queue: any failed Sheet write is parked in localStorage
     and replayed in order until it lands, so the local cache and
     the Sheet stop silently diverging after a flaky request.
   ============================================================ */
function getAuthToken(forcePrompt) {
  // v9.4.1: window.prompt() is unreliable on iPhone Safari / webviews, so the
  // token is now entered only via the Settings page field. If it's missing
  // (or a forced refresh is requested after an unauthorized response), we
  // toast and route the user to Settings instead of prompting.
  const t = localStorage.getItem('pursuit_token') || '';
  if (!t || forcePrompt) {
    toast('Backend token needed - enter it in Settings', 'error');
    if (STATE.page !== 'settings') nav('settings');
    if (forcePrompt) return '';
  }
  return t;
}

function loadPushQueue() {
  try { return JSON.parse(localStorage.getItem('pursuit_pushqueue') || '[]'); }
  catch(e) { return []; }
}
function savePushQueue(q) {
  localStorage.setItem('pursuit_pushqueue', JSON.stringify(q));
}
function enqueuePush(action, payload) {
  const q = loadPushQueue();
  // Compact: a newer save of the same record replaces the queued one
  if (payload && payload.id && ['saveLead','saveCall','saveActivity'].includes(action)) {
    const i = q.findIndex(it => it.action === action && it.payload && it.payload.id === payload.id);
    if (i !== -1) q.splice(i, 1);
  }
  q.push({ action: action, payload: payload, ts: new Date().toISOString(), attempts: 0 });
  savePushQueue(q);
}

let _queueFlushing = false;
async function flushPushQueue() {
  if (_queueFlushing) return;
  if (!STATE.config.appsScriptUrl) return;
  if (!localStorage.getItem('pursuit_token')) return; // never prompt from a timer
  let q = loadPushQueue();
  if (q.length === 0) return;
  _queueFlushing = true;
  let flushed = 0;
  try {
    while (q.length) {
      const item = q[0];
      try {
        await backendCall(item.action, item.payload, { silent: true });
        q.shift();
        savePushQueue(q);
        flushed++;
      } catch(e) {
        item.attempts = (item.attempts || 0) + 1;
        if (item.attempts >= 20) {
          q.shift();
          toast('Gave up on a queued ' + item.action + ' after 20 attempts', 'error');
        }
        savePushQueue(q);
        break; // preserve order -- retry on the next cycle
      }
    }
    if (flushed > 0 && loadPushQueue().length === 0) {
      toast('Sync queue cleared (' + flushed + ' change' + (flushed === 1 ? '' : 's') + ')', 'success');
    }
  } finally {
    _queueFlushing = false;
  }
}

/* ------------------------------------------------------------
   WEBSITE EXISTENCE CHECK
   A browser can't reliably probe arbitrary domains (CORS blocks
   the response status), so the real check runs on the Apps Script
   backend via UrlFetchApp, which sees the true HTTP status.
   Backend action 'verifyWebsite' expects { website } and returns
   { ok: bool, status: number|null, finalUrl: string, reason: string }.
   ------------------------------------------------------------ */
function normaliseDomain(website) {
  if (!website) return '';
  return String(website).trim()
    .replace(/^https?:\/\//i, '')
    .replace(/\/.*$/, '')
    .replace(/\s+/g, '')
    .toLowerCase();
}

async function verifyWebsite(website) {
  const domain = normaliseDomain(website);
  if (!domain || !domain.includes('.')) {
    return { ok: false, status: null, reason: 'no-domain' };
  }
  try {
    const data = await backendCall('verifyWebsite', { website: domain });
    return {
      ok: !!data.ok,
      status: data.status ?? null,
      finalUrl: data.finalUrl || '',
      reason: data.reason || (data.ok ? 'reachable' : 'unreachable')
    };
  } catch (e) {
    // Backend missing the action, or network failure — report as unknown,
    // never silently pass it as verified.
    return { ok: false, status: null, reason: 'check-failed: ' + e.message };
  }
}

// Verify an array of leads in place; sets lead._websiteCheck on each.
async function verifyLeadWebsites(leads, onProgress) {
  let done = 0;
  for (const lead of leads) {
    lead._websiteCheck = { state: 'checking' };
    if (onProgress) onProgress(done, leads.length);
    const result = await verifyWebsite(lead.website);
    lead._websiteCheck = Object.assign({ state: 'done' }, result);
    done++;
    if (onProgress) onProgress(done, leads.length);
  }
  return leads;
}

async function syncFromBackend() {
  if (!STATE.config.appsScriptUrl) return;
  // Replay queued writes first so the pull does not clobber them
  await flushPushQueue();
  try {
    const data = await backendCall('getAll', {});
    STATE.leads = data.leads || [];
    STATE.calls = data.calls || [];
    STATE.activities = data.activities || [];
    if (data.changes) STATE.changes = data.changes;
    STATE.config.lastSync = new Date().toISOString();
    migrateLeadValues();
    saveLocal();
    updateConnIndicator(true);
    toast('Synced from backend', 'success');
  } catch(e) {
    updateConnIndicator(false);
    toast('Sync failed: ' + e.message, 'error');

// Append a row to both the in-memory audit log and the Changes sheet.
function logChange(kind, leadId, summary, extra) {
  const lead = STATE.leads.find(l => l.id === leadId);
  const entry = {
    id: 'CH' + Date.now() + Math.random().toString(36).slice(2,6),
    kind,                                   // 'stage' | 'owner' | 'delete' | 'create' | 'qualify' | 'disqualify'
    leadId,
    companyName: lead ? lead.companyName : (extra?.companyName || '—'),
    user: STATE.currentUser || 'unknown',
    date: new Date().toISOString(),
    summary,
    extra: extra || null
  };
  STATE.changes.push(entry);
  saveLocal();
  if (STATE.config.appsScriptUrl) {
    backendCall('logChange', entry).catch(() => enqueuePush('logChange', entry));
  }
  return entry;
}

async function pushLead(lead) {
  if (!STATE.config.appsScriptUrl) return;
  try {
    await backendCall('saveLead', lead);
  } catch(e) {
    enqueuePush('saveLead', lead);
    toast('Sheet unreachable: change queued, will retry', 'error');
  }
}

async function pushCall(call) {
  if (!STATE.config.appsScriptUrl) return;
  try { await backendCall('saveCall', call); }
  catch(e) { enqueuePush('saveCall', call); toast('Sheet unreachable: call queued, will retry', 'error'); }
}

async function pushActivity(activity) {
  if (!STATE.config.appsScriptUrl) return;
  try { await backendCall('saveActivity', activity); }
  catch(e) { enqueuePush('saveActivity', activity); toast('Sheet unreachable: activity queued, will retry', 'error'); }
}

function updateConnIndicator(ok) {

/* ============================================================
   UTILITIES
   ============================================================ */
function uid() { return 'L' + Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function fmtDate(d) {
  if (!d) return '—';
  const date = new Date(d);
  return date.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' });
}
function fmtDateTime(d) {
  if (!d) return '—';
  const date = new Date(d);
  return date.toLocaleString('en-GB', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
}
function daysBetween(a, b) {
  return Math.round((new Date(b) - new Date(a)) / 86400000);
}
function fmtMoney(n) {
  const v = Number(n);
  if (!isFinite(v) || v <= 0) return '—';
  return '€' + Math.round(v).toLocaleString('en-IE');
}
function stageInfo(stageKey) {
  return STAGES.find(s => s.key === stageKey) || STAGES[0];
}
function escapeHtml(s) {
  return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function toast(msg, kind='') {
  const el = document.createElement('div');
  el.className = 'toast ' + kind;
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}
function openModal(html) {
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modal').classList.add('open');
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
}
document.getElementById('modal').addEventListener('click', e => {
  if (e.target.id === 'modal') closeModal();
});

    owner: document.getElementById('addLeadOwner').value,
    createdBy: STATE.currentUser,
    lastModifiedBy: STATE.currentUser,
    lastModifiedAt: new Date().toISOString(),
    addedManually: true,
    created: new Date().toISOString(),
    updated: new Date().toISOString(),
    stageHistory: [{ stage: 'Initial Contact', date: new Date().toISOString(), user: STATE.currentUser, note: 'Manually added' }],
    qualification: {}
  };
  ensureQualification(lead);

  nav('leadDetail');

    setTimeout(() => regeneratePitch(lead.id), 200);

  const count = parseInt(document.getElementById('genCount').value);

  if (!offer) { toast('Add your value prop first', 'error'); return; }

  const btn = document.getElementById('genBtn');

  btn.innerHTML = '<span class="spinner"></span> ' + (source === 'apollo' ? 'Searching Apollo…' : 'Thinking…');

  try {
    const action = source === 'apollo' ? 'apolloSearch' : 'generateLeads';
    const data = await backendCall(action, {
      sector, country, size, count, offer, prompt,
      companyContext: buildAIContext(),
      sectorBrief: sectorBrief(sector)
    });
    // Apollo path attaches an apollo metadata block; surface that to the user
    const apolloMeta = data.apollo || null;
    const honestyNote = data.honestyNote || null;  // Claude path may include this
    const leads = (data.leads || []).map(l => {
      const lead = {
        id: uid(),
        companyName: l.companyName || 'Unknown',
        contactName: l.contactName || '',
        title: l.title || '',
        phone: l.phone || '',
        email: l.email || '',
        sector, country, size,
        pitch: l.pitch || '',
        research: null,
        status: 'Initial Contact',
        value: DEFAULT_LEAD_VALUE,
        notes: l.rationale || '',
        owner: STATE.currentUser,
        createdBy: STATE.currentUser,
        lastModifiedBy: STATE.currentUser,
        lastModifiedAt: new Date().toISOString(),
        addedManually: false,
        // Apollo provenance — used to show the verified badge and (later) reveal contact details on save
        source: l.source || (source === 'apollo' ? 'apollo' : 'claude'),
        confidence: l.confidence || (l.source === 'apollo' ? 'confident' : 'verify'),
        apolloPersonId: l.apolloPersonId || '',
        apolloOrgId: l.apolloOrgId || '',
        website: l.website || '',
        created: new Date().toISOString(),
        updated: new Date().toISOString(),
        stageHistory: [{ stage: 'Initial Contact', date: new Date().toISOString(), user: STATE.currentUser }],
        qualification: {}
      };
      ensureQualification(lead);
      return lead;
    });
    if (leads.length === 0) {
      document.getElementById('genResult').innerHTML = `
        <div class="card"><div class="empty">
          <div class="serif">${source === 'apollo' ? 'No Apollo matches' : 'Claude declined to name leads'}</div>
          <div style="margin-top:8px;">${apolloMeta?.message || honestyNote || 'Try widening the sector, country, or employee range.'}</div>
        </div></div>`;
      return;
    }
    // Confirm each company's website actually resolves before showing them as
    // saveable. Claude-brainstormed leads in particular can name companies/domains
    // that don't exist; this filters those out at the source.
    document.getElementById('genResult').innerHTML = `<div class="empty"><span class="spinner"></span> <div class="serif" style="margin-top:12px;">Verifying websites… <span id="verifyProgress">0/${leads.length}</span></div></div>`;
    await verifyLeadWebsites(leads, (done, total) => {

    toast(e.message, 'error');

    btn.disabled = false;
    btn.innerHTML = source === 'apollo' ? 'Search Apollo' : 'Generate with Claude';
  }
}

function renderGenResult(leads, apolloMeta, honestyNote) {
  const isApollo = leads.length > 0 && leads[0].source === 'apollo';

  const confBadge = (c) => {
    if (c === 'confident') return `<span class="pill" style="background:var(--emerald-soft); color:var(--emerald); border-color:var(--emerald); font-size:10px;">● Confident</span>`;
    if (c === 'verify')    return `<span class="pill" style="background:var(--gold-soft); color:var(--gold); border-color:var(--gold); font-size:10px;">⚠ Verify before contact</span>`;
    if (c === 'archetype') return `<span class="pill" style="background:var(--blue-soft); color:var(--blue); border-color:var(--blue); font-size:10px;">◇ Archetype — not a real co.</span>`;
    return '';
  };
  // Website existence badge, from lead._websiteCheck set by verifyLeadWebsites().
  const siteBadge = (chk) => {
    if (!chk) return '';
    if (chk.ok) return `<span class="pill" style="background:var(--emerald-soft); color:var(--emerald); border-color:var(--emerald); font-size:10px;">✓ Website live${chk.status ? ' (' + chk.status + ')' : ''}</span>`;
    if (chk.reason === 'no-domain') return `<span class="pill" style="background:var(--rose-soft); color:var(--rose); border-color:var(--rose); font-size:10px;">✕ No website given</span>`;
    if (chk.reason && chk.reason.indexOf('check-failed') === 0) return `<span class="pill" style="background:var(--gold-soft); color:var(--gold); border-color:var(--gold); font-size:10px;">? Couldn't verify</span>`;
    return `<span class="pill" style="background:var(--rose-soft); color:var(--rose); border-color:var(--rose); font-size:10px;">✕ Website not found${chk.status ? ' (' + chk.status + ')' : ''}</span>`;
  };
  const html = `
    <div class="card">
      <div class="card-head">
        <div>
          <div class="card-title">${leads.length} ${isApollo ? 'real leads' : 'suggestions'}</div>
          <div class="card-sub">${isApollo
            ? (apolloMeta?.message || 'From Apollo · review, deselect any to skip, then save to pipeline')

        </div>
        <div style="display:flex; gap:10px;">
          <button class="btn btn-ghost" onclick="document.querySelectorAll('.gen-check').forEach(c => c.checked = false)">Clear all</button>
          <button class="btn btn-primary" id="saveGen">Save selected to pipeline</button>
        </div>
      </div>
      ${honestyNote ? `
        <div style="margin-bottom:14px; padding:12px 16px; background:var(--bg-sunken); border-left:3px solid var(--blue); border-radius:0 6px 6px 0; font-size:13px; color:var(--ink-soft);">
          <strong style="color:var(--ink);">Claude says:</strong> ${escapeHtml(honestyNote)}
        </div>` : ''}
      <div id="genLeadsList">
        ${leads.map((l, i) => {
          const verified = l.source === 'apollo';
          const hasEmail = !!l.email;
          const isArchetype = l.confidence === 'archetype';
          const chk = l._websiteCheck;
          const siteFailed = chk && chk.state === 'done' && !chk.ok && chk.reason !== 'check-failed';
          const uncheck = isArchetype || siteFailed;
          return `
          <div style="padding:16px 0; border-bottom:1px solid var(--line-soft);" data-idx="${i}">
            <div style="display:flex; align-items:flex-start; gap:12px;">
              <input type="checkbox" class="gen-check" ${uncheck ? '' : 'checked'} data-idx="${i}" style="margin-top:4px; width:16px; height:16px;" ${siteFailed ? 'title="Website could not be verified — unticked by default. Confirm the company is real before saving."' : (isArchetype ? 'title="Archetype profiles are unticked by default — use them as search guides rather than saving as leads"' : '')}/>
              <div style="flex:1;">
                <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
                  <span style="font-weight:600; font-size:15px; ${isArchetype ? 'font-style:italic; color:var(--ink-soft);' : ''}">${escapeHtml(l.companyName)}</span>
                  ${verified
                    ? `<span class="pill" style="background:var(--emerald-soft); color:var(--emerald); border-color:var(--emerald); font-size:10px;">● Apollo verified</span>`
                    : confBadge(l.confidence)}
                  ${siteBadge(chk)}
                  ${l.website ? `<a href="https://${l.website.replace(/^https?:\/\//,'')}" target="_blank" rel="noopener" style="font-size:11px; color:var(--ink-muted); text-decoration:none;">${escapeHtml(l.website.replace(/^https?:\/\//,''))} ↗</a>` : ''}
                </div>
                <div style="font-size:12px; color:var(--ink-muted); margin-top:3px;">
                  ${l.contactName ? escapeHtml(l.contactName) + (l.title ? ' · ' + escapeHtml(l.title) : '') : (l.title ? '<em>' + escapeHtml(l.title) + ' (no name yet — research/Apollo can fill this in)</em>' : '<em>contact unknown</em>')}
                </div>
                <div style="font-size:12px; color:var(--ink-muted); margin-top:2px;">
                  ${hasEmail
                    ? escapeHtml(l.email)
                    : (verified ? '<em style="color:var(--gold);">email needs reveal (1 credit at save)</em>' : '<em style="color:var(--ink-muted);">no email — verify via Hunter.io or company website</em>')} · ${l.phone ? escapeHtml(l.phone) : '<em style="color:var(--ink-muted);">no phone</em>'}

                <div class="pitch-block" style="margin-top:12px; padding:18px;">
                  <div class="pitch-label">${isArchetype ? 'Pitch for this archetype' : 'Elevator pitch'}</div>
                  <div class="pitch-text" style="font-size:16px;">${escapeHtml(l.pitch)}</div>
                </div>
                ${l.notes ? `<details ${isArchetype ? 'open' : ''} style="margin-top:8px;"><summary>${isArchetype ? 'Where to find real companies matching this archetype' : (verified ? 'Apollo details' : 'Why this lead?')}</summary><div style="font-size:12px; color:var(--ink-soft); margin-top:6px; line-height:1.5;">${escapeHtml(l.notes)}</div></details>` : ''}
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  document.getElementById('genResult').innerHTML = html;
  document.getElementById('saveGen').addEventListener('click', async () => {
    const checked = Array.from(document.querySelectorAll('.gen-check')).filter(c => c.checked).map(c => parseInt(c.dataset.idx));
    const toSave = checked.map(i => leads[i]);

    const unverified = toSave.filter(l => l._websiteCheck && l._websiteCheck.state === 'done' && !l._websiteCheck.ok && l._websiteCheck.reason !== 'check-failed');
    if (unverified.length > 0) {

      const proceed = confirm(`${unverified.length} selected lead${unverified.length === 1 ? ' has' : 's have'} a website that could not be confirmed to exist:\n\n${names}\n\nThese may not be real companies. Save anyway?`);
      if (!proceed) return;

    STATE.leads.push(...toSave);

    for (const lead of toSave) {

      await pushLead(lead);
      const tag = lead.source === 'apollo' ? 'Apollo' : 'Claude';
      logChange('create', lead.id, `Generated ${lead.companyName} via ${tag}`);
    }
    toast(`Saved ${toSave.length} ${isApollo ? 'verified ' : ''}leads to pipeline`, 'success');
    nav('leads');
  });

// CSV parser — handles \\n / \\r\\n line endings, comma or tab delimiters,
// quoted fields (with "" as escaped quote), trims whitespace from values.
// Returns { headers: [...], rows: [{col: val, ...}] }.
function parseCsv(text) {
  text = text.replace(/\r\n/g, '\n').trim();
  if (!text) return { headers: [], rows: [] };
  // Detect delimiter by which appears more in the first line
  const firstLine = text.split('\n')[0];
  const delim = (firstLine.split('\t').length > firstLine.split(',').length) ? '\t' : ',';
  // Tokenise respecting quoted fields
  const records = [];
  let cur = [];
  let field = '';
  let inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    const next = text[i+1];
    if (inQuotes) {
      if (ch === '"' && next === '"') { field += '"'; i++; }
      else if (ch === '"') { inQuotes = false; }
      else { field += ch; }
    } else {
      if (ch === '"') { inQuotes = true; }
      else if (ch === delim) { cur.push(field); field = ''; }
      else if (ch === '\n') { cur.push(field); records.push(cur); cur = []; field = ''; }
      else { field += ch; }
    }
  }
  if (field !== '' || cur.length) { cur.push(field); records.push(cur); }
  if (records.length === 0) return { headers: [], rows: [] };
  const headers = records[0].map(h => String(h).trim());
  const rows = records.slice(1)
    .filter(r => r.some(v => String(v).trim() !== ''))    // drop blank lines
    .map(r => {
      const obj = {};
      headers.forEach((h, i) => { obj[h] = (r[i] !== undefined) ? String(r[i]).trim() : ''; });
      return obj;
    });
  return { headers, rows };
}

// Given parsed headers and a regulator's suggestedColumns spec, auto-pick
// the best-matching header for each lead field. Returns a mapping object
// like { companyName: 'Centre Name', contactName: 'Person in Charge', ... }
function autoMapColumns(headers, suggestedColumns) {
  const map = {};
  const lower = headers.map(h => h.toLowerCase().trim());
  Object.keys(suggestedColumns).forEach(field => {
    const candidates = suggestedColumns[field];
    for (const candidate of candidates) {
      const idx = lower.findIndex(h => h === candidate.toLowerCase()
                                     || h.includes(candidate.toLowerCase()));
      if (idx >= 0) { map[field] = headers[idx]; return; }
    }
  });
  return map;
}

// Render one row of the sample preview given the current column mapping
function regulatorRowPreview(row, mapping) {
  const v = (field) => mapping[field] ? (row[mapping[field]] || '') : '';

  let contact = v('contactName');
  if (!contact) {
    const fn = v('firstName'), ln = v('lastName');
    contact = [fn, ln].filter(x => x).join(' ');
  }
  // companyName fallback to altCompanyName if mapped
  const company = v('companyName') || row[mapping.altCompanyName] || '(blank)';
  return `<tr>
    <td>${escapeHtml(company)}</td>
    <td>${escapeHtml(contact)}</td>
    <td>${escapeHtml(v('title'))}</td>
    <td>${escapeHtml(v('email'))}</td>
    <td>${escapeHtml(v('phone'))}</td>
    <td>${escapeHtml(v('country'))}</td>
  </tr>`;
}

// Convert all parsed rows into Lead objects ready to push to the pipeline.
// Optionally calls the backend to batch-generate AI pitches.
async function importRegulatorLeads() {
  if (!ensureCurrentUser()) return;
  const parsed = STATE._regulatorParsed;
  const mapping = STATE._regulatorMapping || {};
  const reg = regulatorByKey(STATE._regulatorChoice);
  if (!parsed || parsed.rows.length === 0) { toast('Nothing to import', 'error'); return; }
  if (!mapping.companyName) { toast('Map the Company name column first', 'error'); return; }
  const generatePitches = document.getElementById('genPitchesToggle')?.checked !== false;

  const btn = document.getElementById('importRegulatorBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Importing…';

  // 1. Build raw Lead objects from rows
  const v = (row, field) => mapping[field] ? (row[mapping[field]] || '') : '';
  const rawLeads = parsed.rows.map(row => {
    let contact = v(row, 'contactName');
    if (!contact) {
      const fn = v(row, 'firstName'), ln = v(row, 'lastName');
      contact = [fn, ln].filter(x => x).join(' ');
    }
    const company = v(row, 'companyName') || row[mapping.altCompanyName] || '';
    if (!company) return null; // skip rows with no company name
    return {
      companyName: company,
      contactName: contact,
      title: v(row, 'title'),
      email: v(row, 'email'),
      phone: v(row, 'phone'),
      website: v(row, 'website'),
      country: v(row, 'country') || 'Ireland'
    };
  }).filter(l => l !== null);

  if (rawLeads.length === 0) {
    btn.disabled = false;
    btn.innerHTML = `Import to pipeline`;
    toast('No rows with a company name found', 'error');
    return;
  }

  // 2. Optionally generate pitches in batches of 25
  let pitches = new Array(rawLeads.length).fill('');
  if (generatePitches) {
    try {
      for (let i = 0; i < rawLeads.length; i += 25) {
        btn.innerHTML = `<span class="spinner"></span> Generating pitches… (${i}/${rawLeads.length})`;
        const batch = rawLeads.slice(i, i + 25);
        const data = await backendCall('generatePitchesBulk', {
          leads: batch,
          sector: reg.sector || '',
          country: 'Ireland',
          size: '',
          offer: STATE.config.playbook?.oneLiner || '',
          companyContext: buildAIContext(),
          sectorBrief: sectorBrief(reg.sector)
        });
        (data.pitches || []).forEach((p, j) => { pitches[i + j] = p || ''; });
      }
    } catch(e) {
      toast('Pitch generation failed: ' + e.message + ' — saving without pitches', 'error');
    }
  }

  // 3. Convert to full Lead shape and save
  btn.innerHTML = '<span class="spinner"></span> Saving to pipeline…';
  const now = new Date().toISOString();
  const leads = rawLeads.map((l, i) => {
    const lead = {
      id: uid(),
      companyName: l.companyName,
      contactName: l.contactName,
      title: l.title,
      phone: l.phone,
      email: l.email,
      website: l.website,
      sector: reg.sector || '',
      country: l.country,
      size: '',
      pitch: pitches[i] || '',
      research: null,
      status: 'Initial Contact',
      value: DEFAULT_LEAD_VALUE,
      notes: `Imported from ${reg.label}`,
      owner: STATE.currentUser,
      createdBy: STATE.currentUser,
      lastModifiedBy: STATE.currentUser,
      lastModifiedAt: now,
      addedManually: false,
      source: 'regulator',
      regulatorKey: reg.key,
      confidence: 'confident',  // regulator data is real
      created: now,
      updated: now,
      stageHistory: [{ stage: 'Initial Contact', date: now, user: STATE.currentUser }],
      qualification: {}
    };
    ensureQualification(lead);
    return lead;
  });

  STATE.leads.push(...leads);
  saveLocal();
  for (const lead of leads) {
    await pushLead(lead);
    logChange('create', lead.id, `Imported ${lead.companyName} from ${reg.label}`);
  }

  // Reset state and navigate
  STATE._regulatorParsed = null;
  STATE._regulatorMapping = null;
  toast(`Imported ${leads.length} leads from ${reg.label}`, 'success');
  nav('leads');
}

  return `
    <div class="card" style="margin-top:24px;">
      <div class="card-head">

function renderResearch(r) {
  if (typeof r === 'string') {
    return `<div style="white-space:pre-wrap; font-size:13px; line-height:1.6;">${escapeHtml(r)}</div>`;
  }
  return `
    ${r.overview ? `<div class="research-section"><h4>Company overview</h4><p>${escapeHtml(r.overview)}</p></div>` : ''}
    ${r.products ? `<div class="research-section"><h4>What they do</h4><p>${escapeHtml(r.products)}</p></div>` : ''}
    ${r.painPoints && r.painPoints.length ? `<div class="research-section"><h4>Likely pain points</h4><ul>${r.painPoints.map(p => `<li>${escapeHtml(p)}</li>`).join('')}</ul></div>` : ''}
    ${r.decisionMakers ? `<div class="research-section"><h4>Decision makers to target</h4><p>${escapeHtml(r.decisionMakers)}</p></div>` : ''}
    ${r.recentSignals && r.recentSignals.length ? `<div class="research-section"><h4>Recent signals</h4><ul>${r.recentSignals.map(p => `<li>${escapeHtml(p)}</li>`).join('')}</ul></div>` : ''}
    ${r.competitors ? `<div class="research-section"><h4>Competitive landscape</h4><p>${escapeHtml(r.competitors)}</p></div>` : ''}
    ${r.openingHooks && r.openingHooks.length ? `<div class="research-section"><h4>Opening hooks for first call</h4><ul>${r.openingHooks.map(p => `<li>${escapeHtml(p)}</li>`).join('')}</ul></div>` : ''}
    ${r.questionsToAsk && r.questionsToAsk.length ? `<div class="research-section"><h4>Discovery questions</h4><ul>${r.questionsToAsk.map(p => `<li>${escapeHtml(p)}</li>`).join('')}</ul></div>` : ''}

async function generateResearch(leadId) {
  const lead = STATE.leads.find(l => l.id === leadId);
  if (!lead) return;
  toast('Generating research…');
  try {
    const data = await backendCall('generateResearch', {
      companyName: lead.companyName,
      sector: lead.sector,
      country: lead.country,
      size: lead.size,
      offer: lead.notes,
      companyContext: buildAIContext(),
      sectorBrief: sectorBrief(lead.sector)
    });
    lead.research = data.research;
    lead.updated = new Date().toISOString();
    saveLocal();
    await pushLead(lead);
    toast('Research generated', 'success');
    render();
  } catch(e) { toast(e.message, 'error'); }
}

async function regeneratePitch(leadId) {
  const lead = STATE.leads.find(l => l.id === leadId);
  if (!lead) return;
  toast('Crafting a new pitch…');
  try {
    const data = await backendCall('generatePitch', {
      companyName: lead.companyName,
      sector: lead.sector,
      size: lead.size,
      offer: lead.notes,
      companyContext: buildAIContext(),
      sectorBrief: sectorBrief(lead.sector)
    });
    lead.pitch = data.pitch;
    lead.updated = new Date().toISOString();
    saveLocal();
    await pushLead(lead);
    toast('New pitch ready', 'success');
    render();
  } catch(e) { toast(e.message, 'error'); }
}

      </div>

        ? `<div class="empty"><div class="serif">No sequence yet</div><div>Generates three emails and puts the first in your Gmail drafts.</div></div>`

  const when = i === 0 ? 'Send now' : '+' + (em.sendAfterDays || (i === 1 ? 3 : 7)) + ' days';

          <button class="btn btn-primary" onclick="pushOutreachToGmail('${lead.id}', ${i})">→ Gmail draft</button>
        </div>
      </div>
      <div style="margin-top:10px; font-size:13px; line-height:1.7; color:var(--ink-soft); white-space:pre-wrap;">${escapeHtml(em.body || '')}</div>
    </div>`;
}

async function draftOutreach(leadId) {
  const lead = STATE.leads.find(l => l.id === leadId);
  if (!lead) return;
  toast('Writing the outreach sequence…');
  try {
    const lastCall = STATE.calls.filter(c => c.leadId === lead.id).sort((a, b) => new Date(b.date) - new Date(a.date))[0];
    const data = await backendCall('draftOutreach', {
      companyName: lead.companyName,
      contactName: lead.contactName,
      title: lead.title,
      email: lead.email,
      sector: lead.sector,
      size: lead.size,
      status: lead.status,
      pitch: lead.pitch,
      notes: lead.notes,
      lastCallSummary: lastCall ? (lastCall.summary || '') : '',
      lastCallObjections: lastCall ? (lastCall.objections || []) : [],
      lastCallCta: lastCall ? (lastCall.cta || '') : '',
      companyContext: buildAIContext(),
      sectorBrief: sectorBrief(lead.sector)
    });
    lead.outreach = data.emails || [];
    lead.updated = new Date().toISOString();
    saveLocal();
    await pushLead(lead);
    if (data.draftCreated) toast('Email 1 is in your Gmail drafts — review and send', 'success');
    else if (data.draftWarning) toast(data.draftWarning, 'error');
    else toast('Sequence ready', 'success');
    render();
  } catch (e) { toast(e.message, 'error'); }
}

function copyOutreachEmail(leadId, i) {
  const lead = STATE.leads.find(l => l.id === leadId);
  const em = lead && Array.isArray(lead.outreach) ? lead.outreach[i] : null;
  if (!em) { toast('Nothing to copy', 'error'); return; }
  navigator.clipboard.writeText((em.subject ? 'Subject: ' + em.subject + '\n\n' : '') + (em.body || ''))
    .then(() => toast('Copied', 'success'))
    .catch(() => toast('Copy failed', 'error'));
}

async function pushOutreachToGmail(leadId, i) {
  const lead = STATE.leads.find(l => l.id === leadId);
  const em = lead && Array.isArray(lead.outreach) ? lead.outreach[i] : null;
  if (!em) { toast('Nothing to draft', 'error'); return; }
  if (!lead.email) { toast('Add an email address to the lead first', 'error'); return; }
  toast('Creating Gmail draft…');
  try {
    await backendCall('createGmailDraft', { to: lead.email, subject: em.subject || '', body: em.body || '' });
    toast('Draft created in Gmail — review and send', 'success');
  } catch (e) { toast(e.message, 'error'); }
}

async function runPipelineReview() {
  toast('Reviewing the pipeline…');
  try {
    const data = await backendCall('pipelineReview', { companyContext: buildAIContext() });
    openModal(`
      <div class="modal-head"><h3 class="serif" style="font-size:24px;">Pipeline review</h3><button class="btn btn-ghost" onclick="closeModal()">×</button></div>
      <div class="modal-body" style="white-space:pre-wrap; font-size:13px; line-height:1.7;">${escapeHtml(data.review || '')}</div>
      <div class="modal-foot"><button class="btn btn-primary" onclick="closeModal()">Done</button></div>`);
  } catch (e) { toast(e.message, 'error'); }
}

function saveLeadEdits(leadId) {
  if (!ensureCurrentUser()) return;
  const lead = STATE.leads.find(l => l.id === leadId);
  if (!lead) return;
  const previousOwner = lead.owner;
  document.querySelectorAll('[data-edit]').forEach(el => {
    lead[el.dataset.edit] = el.value;
  });
  document.querySelectorAll('[data-edit-num]').forEach(el => {
    lead[el.dataset.editNum] = Math.max(0, Number(el.value) || 0);
  });
  lead.updated = new Date().toISOString();
  lead.lastModifiedBy = STATE.currentUser;
  lead.lastModifiedAt = lead.updated;
  if (lead.owner !== previousOwner) {
    logChange('owner', lead.id, `Owner changed from ${previousOwner || 'unassigned'} to ${lead.owner || 'unassigned'}`);
  }
  saveLocal();
  pushLead(lead);
  toast('Saved', 'success');
}

function updateLeadStatus(leadId, newStatus) {
  if (!ensureCurrentUser()) return;
  const lead = STATE.leads.find(l => l.id === leadId);
  if (!lead || lead.status === newStatus) return;
  const previousStatus = lead.status;
  lead.status = newStatus;
  lead.updated = new Date().toISOString();
  lead.lastModifiedBy = STATE.currentUser;
  lead.lastModifiedAt = lead.updated;
  lead.stageHistory = lead.stageHistory || [];
  lead.stageHistory.push({ stage: newStatus, date: new Date().toISOString(), user: STATE.currentUser });
  saveLocal();
  pushLead(lead);
  logChange('stage', lead.id, `${previousStatus} → ${newStatus}`);
  toast(`Moved to ${newStatus}`, 'success');
}

function confirmDeleteLead(leadId) {
  openModal(`
    <div class="modal-head"><h3 class="serif" style="font-size:24px;">Delete this lead?</h3><button class="btn btn-ghost" onclick="closeModal()">×</button></div>
    <div class="modal-body">This will remove the lead and its calls from the local cache and from the Google Sheet. Cannot be undone.</div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" onclick="deleteLead('${leadId}')">Delete</button>
    </div>`);
}

async function deleteLead(leadId) {
  const lead = STATE.leads.find(l => l.id === leadId);
  const name = lead ? lead.companyName : leadId;
  STATE.leads = STATE.leads.filter(l => l.id !== leadId);
  STATE.calls = STATE.calls.filter(c => c.leadId !== leadId);
  saveLocal();
  logChange('delete', leadId, `Deleted ${name}`, { companyName: name });
  try { await backendCall('deleteLead', { id: leadId }); } catch(e) { enqueuePush('deleteLead', { id: leadId }); }
  closeModal();
  toast('Deleted', 'success');
  nav('leads');
}
