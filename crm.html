function exportCsv() {
  const rows = [['Company','Contact','Title','Email','Phone','Sector','Country','Size','Status','Value (€/mo)','Pitch','Created','Updated']];
  STATE.leads.forEach(l => {
    rows.push([l.companyName, l.contactName, l.title, l.email, l.phone, l.sector, l.country, l.size, l.status, (Number(l.value)||0), l.pitch, l.created, l.updated]);
  });
  const csv = rows.map(r => r.map(c => `"${String(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  download('pursuit-leads-' + Date.now() + '.csv', csv, 'text/csv');
}
function exportJson() {
  const data = { leads: STATE.leads, calls: STATE.calls, activities: STATE.activities };
  download('pursuit-backup-' + Date.now() + '.json', JSON.stringify(data, null, 2), 'application/json');
}
function download(name, content, mime) {
  const blob = new Blob([content], { type: mime });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
}

/* ============================================================
   EVENT BINDING
   ============================================================ */
function bindPageEvents() {
  // BANT field handlers (appear on Qualification and Lead Detail pages)
  document.querySelectorAll('[data-bant-status]').forEach(el => {
    el.addEventListener('change', e => {
      updateBantField(el.dataset.leadId, el.dataset.bantStatus, 'status', e.target.value);
      render();
    });
  });
  document.querySelectorAll('[data-bant-notes]').forEach(el => {
    el.addEventListener('blur', e => {
      updateBantField(el.dataset.leadId, el.dataset.bantNotes, 'notes', e.target.value);
    });
  });

  if (STATE.page === 'generate') {
    document.getElementById('genBtn')?.addEventListener('click', generateLeads);
    document.getElementById('genSector')?.addEventListener('change', updateBriefIndicator);
    updateBriefIndicator();
    // Regulator mode handlers — only present when source === 'regulator'
    document.getElementById('regulatorChoice')?.addEventListener('change', e => {
      STATE._regulatorChoice = e.target.value;
      STATE._regulatorParsed = null;       // reset any prior parse
      STATE._regulatorMapping = null;
      render();
    });
    document.getElementById('parseCsvBtn')?.addEventListener('click', () => {
      const txt = document.getElementById('csvPaste')?.value || '';
      if (!txt.trim()) { toast('Paste a CSV first', 'error'); return; }
      try {
        const parsed = parseCsv(txt);
        if (parsed.rows.length === 0) { toast('No data rows found — check your CSV has a header row plus at least one data row', 'error'); return; }
        STATE._regulatorParsed = parsed;
        STATE._regulatorMapping = null;     // will be auto-detected on first render
        render();
        toast(`Parsed ${parsed.rows.length} rows from ${parsed.headers.length} columns`, 'success');
      } catch(err) {
        toast('CSV parse error: ' + err.message, 'error');
      }
    });
    document.getElementById('importRegulatorBtn')?.addEventListener('click', importRegulatorLeads);
    // Live-update the column mapping when any mapping select changes — re-renders
    // only the sample preview, not the whole page, so the user does not lose focus.
    document.querySelectorAll('[data-map-field]').forEach(sel => {
      sel.addEventListener('change', e => {
        const field = e.target.dataset.mapField;
        if (!STATE._regulatorMapping) STATE._regulatorMapping = {};
        if (e.target.value) STATE._regulatorMapping[field] = e.target.value;
        else delete STATE._regulatorMapping[field];
        // Re-render just the sample body
        const tbody = document.getElementById('regulatorSampleBody');
        if (tbody && STATE._regulatorParsed) {
          const sample = STATE._regulatorParsed.rows.slice(0, 5);
          tbody.innerHTML = sample.map(r => regulatorRowPreview(r, STATE._regulatorMapping)).join('');
        }
      });
    });
  }
  if (STATE.page === 'playbook') {
    document.getElementById('savePlaybook')?.addEventListener('click', savePlaybookFromForm);
  }
  if (STATE.page === 'pipeline' && STATE._pipelineView === 'timeline') {
    bindGanttDrag();
  }
  if (STATE.page === 'activity') {
    document.getElementById('activityFilter')?.addEventListener('change', e => {
      STATE._activityFilter = e.target.value;
      render();
    });
  }
  if (STATE.page === 'followups') {
    document.getElementById('followupKindFilter')?.addEventListener('change', e => {
      STATE._followupKindFilter = e.target.value;
      render();
    });
    document.getElementById('followupLeadFilter')?.addEventListener('change', e => {
      STATE._followupLeadFilter = e.target.value;
      render();
    });
  }
  if (STATE.page === 'analytics') {
    document.getElementById('analyticsRange')?.addEventListener('change', e => {
      STATE._analyticsRange = e.target.value;
      render();
    });
  }
  if (STATE.page === 'leads') {
    document.getElementById('leadSearch')?.addEventListener('input', e => {
      STATE._leadSearch = e.target.value;
      render();
      setTimeout(() => {
        const inp = document.getElementById('leadSearch');
        if (inp) { inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
      }, 0);
    });
    document.getElementById('leadFilter')?.addEventListener('change', e => {
      STATE._leadFilter = e.target.value;
      render();
    });
  }
  if (STATE.page === 'leadDetail') {
    document.getElementById('statusSelect')?.addEventListener('change', e => {
      updateLeadStatus(STATE.selectedLeadId, e.target.value);
      render();
    });
  }
  if (STATE.page === 'listener') {
    document.getElementById('micBtn')?.addEventListener('click', toggleRecording);
    document.getElementById('coachNudgeBtn')?.addEventListener('click', coachNudge);
    document.getElementById('analyseCall')?.addEventListener('click', analyseAndSaveCall);
    document.getElementById('discardCall')?.addEventListener('click', () => {
      STATE.currentTranscript = ''; STATE.interimTranscript = '';
      if (STATE.recording) toggleRecording();
      render();
    });
    document.getElementById('clearTranscript')?.addEventListener('click', () => {
      STATE.currentTranscript = ''; STATE.interimTranscript = '';
      const box = document.getElementById('transcriptBox');
      if (box) box.innerHTML = '';
    });
    document.getElementById('transcriptBox')?.addEventListener('input', e => {
      STATE.currentTranscript = e.target.innerText;
    });
    document.getElementById('callLeadSelect')?.addEventListener('change', e => {
      STATE.currentCallLeadId = e.target.value;
    });
  }
  if (STATE.page === 'settings') {
    document.getElementById('saveToken')?.addEventListener('click', async () => {
      const t = (document.getElementById('tokenInput')?.value || '').trim();
      if (t) localStorage.setItem('pursuit_token', t);
      else localStorage.removeItem('pursuit_token');
      toast('Token saved, testing…');
      try {
        const data = await backendCall('ping', {});
        if (data.ok) {
          updateConnIndicator(true);
          toast('Connected: token accepted', 'success');
          await flushPushQueue();
          render();
        }
      } catch(e) {
        updateConnIndicator(false);
        toast('Test failed: ' + e.message, 'error');
      }
    });
    document.getElementById('testUrl')?.addEventListener('click', async () => {
      toast('Testing connection…');
      try {
        const data = await backendCall('ping', {});
        if (data.ok) {
          updateConnIndicator(true);
          toast('Connected — backend is alive', 'success');
          await syncFromBackend();
          render();
        }
      } catch(e) {
        updateConnIndicator(false);
        toast('Connection failed: ' + e.message, 'error');
      }
    });
    document.getElementById('testApollo')?.addEventListener('click', async () => {
      const status = document.getElementById('apolloStatus');
      status.innerHTML = '<span class="spinner"></span> Testing Apollo…';
      try {
        const data = await backendCall('apolloPing', {});
        if (data.ok) {
          status.innerHTML = `<span style="color:var(--emerald); font-weight:500;">● Connected.</span> Apollo returned ${data.totalPeopleInDb.toLocaleString()} total people available with the current filter (none — empty query). Search itself is free, reveals cost credits at save time.`;
          toast('Apollo connected', 'success');
        }
      } catch(e) {
        status.innerHTML = `<span style="color:var(--rose); font-weight:500;">● Failed.</span> ${escapeHtml(e.message)}`;
        toast('Apollo test failed: ' + e.message, 'error');
      }
    });
  }
}

/* ============================================================
   BANT QUALIFICATION HANDLERS
   ============================================================ */
function updateBantField(leadId, key, kind, value) {
  if (!ensureCurrentUser()) return;
  const lead = STATE.leads.find(l => l.id === leadId);
  if (!lead) return;
  ensureQualification(lead);
  lead.qualification[key][kind] = value;
  // Auto-advance: first BANT touch on an Initial Contact lead bumps it to BANT
  if (lead.status === 'Initial Contact') {
    lead.status = 'BANT';
    lead.stageHistory = lead.stageHistory || [];
    lead.stageHistory.push({ stage: 'BANT', date: new Date().toISOString(), user: STATE.currentUser, note: 'Qualification started' });
    logChange('stage', lead.id, 'Initial Contact → BANT (qualification started)');
  }
  lead.updated = new Date().toISOString();
  lead.lastModifiedBy = STATE.currentUser;
  lead.lastModifiedAt = lead.updated;
  saveLocal();
  pushLead(lead);
}

function qualifyLead(leadId) {
  if (!ensureCurrentUser()) return;
  const lead = STATE.leads.find(l => l.id === leadId);
  if (!lead || !isQualified(lead)) return;
  const q = lead.qualification;
  const summary = BANT_CRITERIA.map(c => `${c.letter}:${q[c.key].status}`).join(' ');
  lead.status = 'Call Made';
  lead.qualifiedAt = new Date().toISOString();
  lead.qualifiedBy = STATE.currentUser;
  lead.updated = lead.qualifiedAt;
  lead.lastModifiedBy = STATE.currentUser;
  lead.lastModifiedAt = lead.qualifiedAt;
  lead.stageHistory = lead.stageHistory || [];
  lead.stageHistory.push({ stage: 'Call Made', date: lead.qualifiedAt, user: STATE.currentUser, note: `Qualified — ${summary}` });
  saveLocal();
  pushLead(lead);
  logChange('qualify', lead.id, `Qualified — ${summary}`);
  toast(`${lead.companyName} qualified → Pipeline`, 'success');
  render();
}

function confirmDisqualify(leadId) {
  const lead = STATE.leads.find(l => l.id === leadId);
  if (!lead) return;
  openModal(`
    <div class="modal-head"><h3 class="serif" style="font-size:24px;">Disqualify ${escapeHtml(lead.companyName)}?</h3><button class="btn btn-ghost" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <p style="margin-bottom:14px;">Moves the lead to <strong>Closed Lost</strong>. Add an optional reason:</p>
      <textarea class="textarea" id="disqualReason" placeholder="e.g. No budget, wrong sector, decision-maker unreachable…"></textarea>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" onclick="doDisqualify('${lead.id}')">Disqualify</button>
    </div>`);
}

function doDisqualify(leadId) {
  if (!ensureCurrentUser()) return;
  const lead = STATE.leads.find(l => l.id === leadId);
  if (!lead) return;
  const reason = document.getElementById('disqualReason')?.value?.trim() || '';
  lead.status = 'Closed Lost';
  lead.updated = new Date().toISOString();
  lead.lastModifiedBy = STATE.currentUser;
  lead.lastModifiedAt = lead.updated;
  lead.stageHistory = lead.stageHistory || [];
  lead.stageHistory.push({ stage: 'Closed Lost', date: lead.updated, user: STATE.currentUser, note: reason ? `Disqualified: ${reason}` : 'Disqualified' });
  saveLocal();
  pushLead(lead);
  logChange('disqualify', lead.id, reason ? `Disqualified: ${reason}` : 'Disqualified');
  closeModal();
  toast(`${lead.companyName} disqualified`, 'success');
  render();
}

/* ============================================================
   QUALIFICATION PAGE
   ============================================================ */
function renderQualification() {
  let list = STATE.leads.filter(isUnqualified);
  const ownerFilter = STATE._qualOwnerFilter || 'all';
  if (ownerFilter === 'mine' && STATE.currentUser) list = list.filter(l => l.owner === STATE.currentUser);
  // Mine first, then newest
  list.sort((a, b) => {
    if (STATE.currentUser) {
      const aMine = a.owner === STATE.currentUser ? 0 : 1;
      const bMine = b.owner === STATE.currentUser ? 0 : 1;
      if (aMine !== bMine) return aMine - bMine;
    }
    return new Date(b.updated || b.created) - new Date(a.updated || a.created);
  });

  return `
    <div class="page-head">
      <div>
        <h1 class="page-title">Qualify <em>leads</em></h1>
        <p class="page-sub">Pre-pipeline. Work through BANT — Budget, Authority, Need, Timing — for each lead. Qualified leads move to the pipeline.</p>
      </div>
      <div class="page-actions">
        ${STATE.currentUser ? `
          <div class="view-toggle">
            <button class="${ownerFilter==='all'?'active':''}" onclick="STATE._qualOwnerFilter='all'; render();">Everyone</button>
            <button class="${ownerFilter==='mine'?'active':''}" onclick="STATE._qualOwnerFilter='mine'; render();">Mine</button>
          </div>` : ''}
      </div>
    </div>
    ${list.length === 0 ? `
      <div class="card"><div class="empty">
        <div class="serif">Nothing to qualify right now</div>
        <div style="margin-top:8px;">${ownerFilter==='mine' ? "None of your leads need qualification." : 'All leads have been assessed.'}</div>
      </div></div>
    ` : list.map(l => renderQualificationCard(l)).join('')}`;
}

function renderQualificationCard(lead) {
  const q = ensureQualification(lead);
  const dots = BANT_CRITERIA.map(c => `<span class="bant-status-dot" style="color:${bantStatusColour(q[c.key].status)}; background:${bantStatusBg(q[c.key].status)}; border-color:${bantStatusColour(q[c.key].status)};">${c.letter}</span>`).join('');
  const ready = isQualified(lead);
  return `
    <div class="qual-card">
      <div class="qual-card-head">
        <div>
          <div class="qual-card-company"><a href="#" onclick="event.preventDefault(); openLead('${lead.id}');" style="color:inherit; text-decoration:none;">${escapeHtml(lead.companyName)}</a></div>
          <div class="qual-card-meta">${escapeHtml(lead.contactName || '—')}${lead.title ? ' · ' + escapeHtml(lead.title) : ''} · ${escapeHtml(lead.sector || '')}</div>
        </div>
        <div style="display:flex; align-items:center; gap:10px;">
          ${ownerPillHtml(lead.owner)}
          <span class="badge ${stageInfo(lead.status).badge}">${escapeHtml(lead.status)}</span>
          <div class="bant-status-dots">${dots}</div>
        </div>
      </div>
      <div class="qual-grid">
        ${BANT_CRITERIA.map(c => `
          <div class="bant-card">
            <div class="bant-card-head">
              <div class="bant-letter">${c.letter}</div>
              <div class="bant-label">${c.label}</div>
              <select class="bant-status-select" data-bant-status="${c.key}" data-lead-id="${lead.id}" style="color:${bantStatusColour(q[c.key].status)}; background:${bantStatusBg(q[c.key].status)}; border-color:${bantStatusColour(q[c.key].status)};">
                ${BANT_STATUSES.map(s => `<option value="${s}" ${q[c.key].status===s?'selected':''}>${s}</option>`).join('')}
              </select>
            </div>
            <div class="bant-prompt">${escapeHtml(c.prompt)}</div>
            <textarea class="bant-notes" data-bant-notes="${c.key}" data-lead-id="${lead.id}" placeholder="Notes…">${escapeHtml(q[c.key].notes || '')}</textarea>
          </div>`).join('')}
      </div>
      <div class="qual-actions">
        <button class="btn btn-ghost" onclick="openLead('${lead.id}')">Open full file →</button>
        <button class="btn btn-danger" onclick="confirmDisqualify('${lead.id}')">Disqualify</button>
        <button class="btn btn-accent" ${ready?'':'disabled'} onclick="qualifyLead('${lead.id}')">Qualify & promote →</button>
      </div>
    </div>`;
}

/* ============================================================
   FOLLOW-UPS PAGE
   Manually-logged touchpoints (calls, visits, memos, etc) and
   scheduled future follow-ups. Replaces the old auto-logged
   `activities` array — same backend sheet, richer shape.
   ============================================================ */
function renderFollowups() {
  const ownerFilter = STATE._followupOwnerFilter || 'all';
  const kindFilter  = STATE._followupKindFilter  || 'all';
  const leadFilter  = STATE._followupLeadFilter  || 'all';
  // Only show "real" follow-ups — entries with a kind field.
  // Legacy stage-change entries (no kind) are ignored on render.
  let list = (STATE.activities || []).filter(a => a && a.kind);
  if (ownerFilter === 'mine' && STATE.currentUser) {
    list = list.filter(a => a.owner === STATE.currentUser);
  }
  if (kindFilter !== 'all') {
    list = list.filter(a => a.kind === kindFilter);
  }
  if (leadFilter !== 'all') {
    list = list.filter(a => a.leadId === leadFilter);
  }

  const overdue  = list.filter(a => a.status === 'scheduled' && isOverdue(a))
                       .sort((a,b) => new Date(a.date) - new Date(b.date));
  const upcoming = list.filter(a => a.status === 'scheduled' && !isOverdue(a))
                       .sort((a,b) => new Date(a.date) - new Date(b.date));
  const done     = list.filter(a => a.status === 'done')
                       .sort((a,b) => new Date(b.date) - new Date(a.date));
  const doneShown = done.slice(0, STATE._followupShowDone || 10);

  const kindOptions = ['<option value="all">All types</option>']
    .concat(FOLLOWUP_KINDS.map(k => `<option value="${k.key}" ${kindFilter===k.key?'selected':''}>${escapeHtml(k.label)}</option>`))
    .join('');

  // Lead filter dropdown — only lists leads that actually have at least one follow-up,
  // so the dropdown stays manageable even with hundreds of leads in the pipeline.
  // Sorted by company name, with a count badge next to each.
  const leadsWithFollowups = {};
  (STATE.activities || []).filter(a => a && a.kind).forEach(a => {
    if (!a.leadId) return;
    leadsWithFollowups[a.leadId] = (leadsWithFollowups[a.leadId] || 0) + 1;
  });
  const leadOptionItems = Object.keys(leadsWithFollowups)
    .map(id => ({ id, lead: STATE.leads.find(l => l.id === id), count: leadsWithFollowups[id] }))
    .filter(x => x.lead)
    .sort((a, b) => a.lead.companyName.localeCompare(b.lead.companyName));
  const leadOptions = [`<option value="all">All leads (${leadOptionItems.length})</option>`]
    .concat(leadOptionItems.map(x => `<option value="${x.id}" ${leadFilter===x.id?'selected':''}>${escapeHtml(x.lead.companyName)} (${x.count})</option>`))
    .join('');

  return `
    <div class="page-head">
      <div>
        <h1 class="page-title">Follow-<em>ups</em></h1>
        <p class="page-sub">Every call, visit, memo and scheduled touchpoint across the pipeline. ${overdue.length ? `<strong style="color:var(--rose);">${overdue.length} overdue</strong> · ` : ''}${upcoming.length} upcoming · ${done.length} done.</p>
      </div>
      <div class="page-actions">
        <button class="btn btn-ghost" onclick="syncFromBackend().then(render)">↻ Sync</button>
        <button class="btn btn-accent" onclick="openLogActionModal()">+ Log action</button>
      </div>
    </div>

    <div class="toolbar">
      <div class="view-toggle">
        <button class="${ownerFilter==='all'?'active':''}" onclick="STATE._followupOwnerFilter='all'; render();">Everyone</button>
        <button class="${ownerFilter==='mine'?'active':''}" onclick="STATE._followupOwnerFilter='mine'; render();">Mine</button>
      </div>
      <select class="select" id="followupKindFilter">${kindOptions}</select>
      <select class="select" id="followupLeadFilter">${leadOptions}</select>
      ${leadFilter !== 'all' || kindFilter !== 'all' || ownerFilter !== 'all' ?
        `<button class="btn btn-ghost" onclick="STATE._followupOwnerFilter='all'; STATE._followupKindFilter='all'; STATE._followupLeadFilter='all'; render();" style="padding:8px 12px; font-size:12px;">Clear filters</button>` : ''}
      <span class="pill" style="margin-left:auto;">${list.length} item${list.length===1?'':'s'} shown</span>
    </div>

    ${overdue.length ? `
      <div class="card" style="border-color:var(--rose); margin-bottom:20px;">
        <div class="card-head">
          <div>
            <div class="card-title" style="color:var(--rose);">Overdue</div>
            <div class="card-sub">${overdue.length} scheduled follow-up${overdue.length===1?'':'s'} past due</div>
          </div>
        </div>
        ${overdue.map(renderFollowupRow).join('')}
      </div>` : ''}

    ${upcoming.length ? `
      <div class="card" style="margin-bottom:20px;">
        <div class="card-head">
          <div>
            <div class="card-title">Coming up</div>
            <div class="card-sub">${upcoming.length} scheduled · soonest first</div>
          </div>
        </div>
        ${upcoming.map(renderFollowupRow).join('')}
      </div>` : ''}

    <div class="card">
      <div class="card-head">
        <div>
          <div class="card-title">Recent activity</div>
          <div class="card-sub">${done.length === 0 ? 'No actions logged yet' : `${doneShown.length} of ${done.length} shown · most recent first`}</div>
        </div>
        ${done.length === 0 ? '' : `<button class="btn btn-ghost" onclick="exportFollowupsCsv()">↓ Export CSV</button>`}
      </div>
      ${done.length === 0 ? `
        <div class="empty">
          <div class="serif">Nothing logged yet</div>
          <div>Click <strong>+ Log action</strong> to record a call, visit or follow-up.</div>
        </div>` : doneShown.map(renderFollowupRow).join('')}
      ${done.length > doneShown.length ? `
        <div style="text-align:center; padding-top:16px;">
          <button class="btn btn-ghost" onclick="STATE._followupShowDone = (STATE._followupShowDone||10) + 20; render();">Show 20 more</button>
        </div>` : ''}
    </div>`;
}

// Renders one follow-up row. Used on both the Follow-ups page and the lead detail page.
function renderFollowupRow(f) {
  const kind = followupKind(f.kind);
  const lead = STATE.leads.find(l => l.id === f.leadId);
  const overdue = isOverdue(f);
  const dateLabel = f.status === 'scheduled'
    ? (overdue ? `Due ${fmtDate(f.date)} · OVERDUE` : `Due ${fmtDate(f.date)}`)
    : fmtDateTime(f.date);
  return `
    <div style="display:flex; gap:14px; padding:14px 0; border-bottom:1px solid var(--line-soft); align-items:flex-start;">
      <div title="${escapeHtml(kind.label)}" style="flex-shrink:0; width:38px; height:38px; border-radius:50%; background:${kind.soft}; color:${kind.colour}; border:1px solid ${kind.colour}; display:flex; align-items:center; justify-content:center; font-family:'Geist Mono',monospace; font-size:11px; font-weight:600;">${kind.mono}</div>
      <div style="flex:1; min-width:0;">
        <div style="display:flex; align-items:baseline; gap:10px; flex-wrap:wrap;">
          <strong style="font-size:13px;">${escapeHtml(kind.label)}</strong>
          ${lead ? `<a href="#" onclick="event.preventDefault(); openLead('${lead.id}')" style="font-size:12px; color:var(--ink-soft); text-decoration:none; border-bottom:1px dotted var(--ink-muted);">${escapeHtml(lead.companyName)}</a>` : '<span class="meta">(no linked lead)</span>'}
          ${f.owner ? `<span class="pill" style="background:${userSoft(f.owner)}; color:${userColour(f.owner)}; border-color:${userColour(f.owner)};">${escapeHtml(f.owner)}</span>` : ''}
          <span class="meta" style="font-size:11px; ${overdue ? 'color:var(--rose); font-weight:500;' : ''}">${dateLabel}</span>
        </div>
        ${f.note ? `<div style="font-size:13px; color:var(--ink-soft); margin-top:6px; line-height:1.5; white-space:pre-wrap;">${escapeHtml(f.note)}</div>` : ''}
      </div>
      <div style="display:flex; flex-direction:column; gap:6px; flex-shrink:0;">
        ${f.status === 'scheduled' ? `<button class="btn btn-ghost" style="padding:6px 10px; font-size:11px;" onclick="markActionDone('${f.id}')">✓ Done</button>` : ''}
        <button class="btn btn-ghost btn-danger" style="padding:6px 10px; font-size:11px;" onclick="confirmDeleteFollowup('${f.id}')">×</button>
      </div>
    </div>`;
}

   FOLLOW-UP MODAL & HANDLERS

function openLogActionModal(prefilledLeadId) {
  if (!ensureCurrentUser()) return;
  const todayLocal = new Date().toISOString().slice(0, 10);
  const tomorrow = new Date(Date.now() + 86400000).toISOString().slice(0, 10);
  const leadOptions = STATE.leads
    .filter(l => !['Closed Won','Closed Lost'].includes(l.status))
    .sort((a,b) => a.companyName.localeCompare(b.companyName))
    .map(l => `<option value="${l.id}" ${prefilledLeadId===l.id?'selected':''}>${escapeHtml(l.companyName)}${l.contactName ? ' — ' + escapeHtml(l.contactName) : ''}</option>`)
    .join('');
  const kindButtons = FOLLOWUP_KINDS.map((k, i) => `
    <label class="kind-pick" style="flex:1; min-width:100px; display:flex; flex-direction:column; align-items:center; gap:6px; padding:12px 8px; border:1px solid var(--line); border-radius:6px; cursor:pointer; transition:all 0.15s;">
      <input type="radio" name="logKind" value="${k.key}" ${i===0?'checked':''} style="display:none;"/>
      <div style="width:32px; height:32px; border-radius:50%; background:${k.soft}; color:${k.colour}; border:1px solid ${k.colour}; display:flex; align-items:center; justify-content:center; font-family:'Geist Mono',monospace; font-size:10px; font-weight:600;">${k.mono}</div>
      <div style="font-size:11px; font-weight:500;">${escapeHtml(k.label)}</div>
    </label>`).join('');
  const ownerOptions = USERS.map(u => `<option value="${u.name}" ${STATE.currentUser===u.name?'selected':''}>${escapeHtml(u.name)}</option>`).join('');

  openModal(`
    <div class="modal-head">
      <h3 class="serif" style="font-size:24px;">Log an action</h3>
      <button class="btn btn-ghost" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <label class="label">Action type</label>
        <div id="kindPicker" style="display:flex; flex-wrap:wrap; gap:8px;">${kindButtons}</div>
      </div>
      <div class="form-row">
        <div style="display:flex; gap:16px;">
          <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
            <input type="radio" name="logMode" value="done" checked id="modeDone"/>
            <span><strong>Log past action</strong> — already happened</span>
          </label>
          <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
            <input type="radio" name="logMode" value="scheduled" id="modeScheduled"/>
            <span><strong>Schedule</strong> — future follow-up</span>
          </label>
        </div>
      </div>
      <div class="form-grid">
        <div class="form-row">
          <label class="label">Lead</label>
          <select class="select" id="logLead">
            <option value="">— Choose a lead —</option>
            ${leadOptions}
          </select>
        </div>
        <div class="form-row">
          <label class="label" id="logDateLabel">When did it happen?</label>
          <input class="input" type="date" id="logDate" value="${todayLocal}" max="${todayLocal}"/>
        </div>
      </div>
      <div class="form-row">
        <label class="label">Owner</label>
        <select class="select" id="logOwner">${ownerOptions}</select>
      </div>
      <div class="form-row">
        <label class="label">Notes</label>
        <textarea class="textarea" id="logNotes" placeholder="What happened? What was said? Any outcomes worth remembering?" style="min-height:100px;"></textarea>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-accent" onclick="saveFollowup()">Save action</button>
    </div>
    <style>
      .kind-pick:hover { background: var(--bg-sunken); }
      .kind-pick:has(input:checked) { border-color: var(--ink); background: var(--bg-sunken); box-shadow: inset 0 0 0 1px var(--ink); }
    </style>
  `);

  // Wire mode toggle: switching to "scheduled" changes the date defaults and label
  const dateInput = document.getElementById('logDate');
  const dateLabel = document.getElementById('logDateLabel');
  document.getElementById('modeDone').addEventListener('change', () => {
    dateLabel.textContent = 'When did it happen?';
    dateInput.value = todayLocal;
    dateInput.max = todayLocal;
    dateInput.min = '';
  });
  document.getElementById('modeScheduled').addEventListener('change', () => {
    dateLabel.textContent = 'When is it due?';

}

async function saveFollowup() {
  if (!ensureCurrentUser()) return;
  const leadId = document.getElementById('logLead').value;
  if (!leadId) { toast('Choose a lead first', 'error'); return; }
  const kind = document.querySelector('input[name="logKind"]:checked')?.value || 'other';
  const mode = document.querySelector('input[name="logMode"]:checked')?.value || 'done';
  const date = document.getElementById('logDate').value;
  if (!date) { toast('Pick a date', 'error'); return; }
  const owner = document.getElementById('logOwner').value || STATE.currentUser;
  const note = document.getElementById('logNotes').value.trim();

  // Build ISO timestamp: scheduled items get midnight-local; done items get "now" if today, else end-of-day for that date
  const today = new Date().toISOString().slice(0, 10);
  let isoDate;
  if (mode === 'done' && date === today) {
    isoDate = new Date().toISOString();
  } else {
    isoDate = new Date(date + 'T12:00:00').toISOString();
  }

  const fu = {
    id: 'F' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
    leadId,
    kind,
    status: mode,
    date: isoDate,
    owner,
    note,
    createdBy: STATE.currentUser,
    createdAt: new Date().toISOString(),
    completedAt: mode === 'done' ? new Date().toISOString() : '',
    completedBy: mode === 'done' ? STATE.currentUser : ''
  };
  STATE.activities = STATE.activities || [];
  STATE.activities.push(fu);
  saveLocal();
  await pushActivity(fu);

  const lead = STATE.leads.find(l => l.id === leadId);
  const kindLabel = followupKind(kind).label;
  logChange('followup', leadId,
    mode === 'done'
      ? `Logged ${kindLabel}${note ? ' — ' + note.slice(0,80) : ''}`
      : `Scheduled ${kindLabel} for ${fmtDate(isoDate)}${note ? ' — ' + note.slice(0,80) : ''}`,
    { kind, status: mode, owner });

  closeModal();
  toast(mode === 'done' ? `${kindLabel} logged for ${lead?.companyName||'lead'}` : `${kindLabel} scheduled for ${fmtDate(isoDate)}`, 'success');
  render();
}

async function markActionDone(actionId) {
  if (!ensureCurrentUser()) return;
  const fu = (STATE.activities || []).find(a => a.id === actionId);
  if (!fu) return;
  fu.status = 'done';
  fu.completedAt = new Date().toISOString();
  fu.completedBy = STATE.currentUser;
  saveLocal();
  await pushActivity(fu);
  logChange('followup', fu.leadId, `Marked ${followupKind(fu.kind).label} as done`, { id: actionId });
  toast('Marked done', 'success');
  render();
}

function confirmDeleteFollowup(actionId) {
  const fu = (STATE.activities || []).find(a => a.id === actionId);
  if (!fu) return;
  const kindLabel = followupKind(fu.kind).label;
  openModal(`
    <div class="modal-head"><h3 class="serif" style="font-size:24px;">Delete this ${escapeHtml(kindLabel.toLowerCase())}?</h3><button class="btn btn-ghost" onclick="closeModal()">×</button></div>
    <div class="modal-body">This permanently removes the entry from the Follow-ups timeline and the Activities sheet. Can't be undone.</div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" onclick="deleteFollowup('${actionId}')">Delete</button>
    </div>`);
}

async function deleteFollowup(actionId) {
  const fu = (STATE.activities || []).find(a => a.id === actionId);
  if (!fu) { closeModal(); return; }
  STATE.activities = STATE.activities.filter(a => a.id !== actionId);
  saveLocal();
  try { await backendCall('deleteActivity', { id: actionId }); } catch(e) { enqueuePush('deleteActivity', { id: actionId }); }
  logChange('followup', fu.leadId, `Deleted ${followupKind(fu.kind).label}`, { id: actionId });
  closeModal();
  toast('Deleted', 'success');
  render();
}

function exportFollowupsCsv() {
  const rows = [['ID','Lead','Type','Status','Date','Owner','Notes','CreatedBy','CreatedAt','CompletedAt','CompletedBy']];
  (STATE.activities || []).filter(a => a && a.kind).forEach(a => {
    const lead = STATE.leads.find(l => l.id === a.leadId);
    rows.push([a.id, lead?.companyName||'(unlinked)', followupKind(a.kind).label, a.status, a.date, a.owner||'', a.note||'', a.createdBy||'', a.createdAt||'', a.completedAt||'', a.completedBy||'']);
  });
  const csv = rows.map(r => r.map(c => `"${String(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  download('pursuit-followups-' + Date.now() + '.csv', csv, 'text/csv');
}

/* ============================================================
   ANALYTICS PAGE
   Native SVG charts — no library. Reads from STATE.leads,
   STATE.calls, STATE.activities, STATE.changes.
   ============================================================ */

// Stage display order + colour mapping for funnel/velocity charts
const ANALYTICS_STAGE_COLOURS = {
  'Initial Contact':   { fill: 'var(--blue-soft)',    stroke: 'var(--blue)' },
  'BANT':             { fill: 'var(--gold-soft)',    stroke: 'var(--gold)' },
  'Call Made':         { fill: 'var(--accent-soft)',  stroke: 'var(--accent)' },
  'Response Received': { fill: '#e8d9f0',             stroke: '#6b2c8a' },
  'CTA Agreed':        { fill: 'var(--emerald-soft)', stroke: 'var(--emerald)' },
  'Closed Won':        { fill: 'var(--emerald)',      stroke: 'var(--emerald)', textOnFill: 'white' },
  'Closed Lost':       { fill: 'var(--rose-soft)',    stroke: 'var(--rose)' }
};

function renderAnalytics() {
  const scope = STATE._analyticsScope || 'all';
  const range = STATE._analyticsRange || '90';

  // Scope: leads owned by current user (if 'mine') or all
  let scopedLeads = [...STATE.leads];
  if (scope === 'mine' && STATE.currentUser) {
    scopedLeads = scopedLeads.filter(l => l.owner === STATE.currentUser);
  }

  // Time range: cap data to the last N days based on lead.created
  const now = Date.now();
  const rangeMs = range === 'all' ? null : parseInt(range) * 86400000;
  const inRange = (iso) => !rangeMs || (now - new Date(iso).getTime()) <= rangeMs;
  const rangedLeads = rangeMs ? scopedLeads.filter(l => inRange(l.created)) : scopedLeads;

  if (rangedLeads.length === 0) {
    return `
      <div class="page-head">
        <div>
          <h1 class="page-title">Analytics</h1>
          <p class="page-sub">Pipeline insight from your CRM data.</p>
        </div>
      </div>
      ${renderAnalyticsControls(scope, range)}
      <div class="card"><div class="empty">
        <div class="serif">No data in this window</div>
        <div style="margin-top:8px;">${scope === 'mine' ? 'You have no leads in this time range. Try switching to Everyone or widening the range.' : 'No leads in this time range. Try widening or generating some leads.'}</div>
        ${STATE.leads.length === 0 ? '<button class="btn btn-accent" style="margin-top:16px;" onclick="nav(\'generate\')">Generate Leads</button>' : ''}
      </div></div>`;
  }

  // ============= STATS =============
  const total = rangedLeads.length;
  const won   = rangedLeads.filter(l => l.status === 'Closed Won');
  const lost  = rangedLeads.filter(l => l.status === 'Closed Lost');
  const closed = won.length + lost.length;
  const winRate = closed > 0 ? Math.round((won.length / closed) * 100) : 0;

  // Deal value: open pipeline (active leads) and won value, within scope+range
  const openValue = rangedLeads
    .filter(l => !['Closed Won','Closed Lost'].includes(l.status))
    .reduce((s, l) => s + (Number(l.value) || 0), 0);
  const wonValue = won.reduce((s, l) => s + (Number(l.value) || 0), 0);

  // Avg days to close (won leads only) — uses stageHistory first-entry → last-entry
  const closingTimes = won.map(l => {
    const hist = l.stageHistory || [];
    if (hist.length < 2) return null;
    return (new Date(hist[hist.length-1].date) - new Date(hist[0].date)) / 86400000;
  }).filter(d => d !== null);
  const avgDaysToClose = closingTimes.length
    ? Math.round(closingTimes.reduce((a,b) => a+b, 0) / closingTimes.length)
    : null;

  // Stale leads: open status, no activity in 30+ days
  const STALE_DAYS = 30;
  const staleLeads = scopedLeads.filter(l => {
    if (['Closed Won','Closed Lost'].includes(l.status)) return false;
    const lastTouch = new Date(l.updated || l.created).getTime();
    return (now - lastTouch) > STALE_DAYS * 86400000;
  }).sort((a,b) => new Date(a.updated || a.created) - new Date(b.updated || b.created));

  // ============= FUNNEL =============
  // Count leads currently in each stage + count of leads that have EVER passed through each stage
  const stageOrder = STAGES.map(s => s.key);
  const everReached = {};
  stageOrder.forEach(s => everReached[s] = 0);
  rangedLeads.forEach(l => {
    const stagesHit = new Set((l.stageHistory || []).map(h => h.stage));
    // Treat current status as reached too (in case stageHistory is incomplete)
    stagesHit.add(l.status);
    stagesHit.forEach(s => { if (everReached[s] !== undefined) everReached[s]++; });
  });

  // ============= VELOCITY =============
  // Avg days spent in each stage across all leads that left that stage
  const stageDwell = {}; // key → array of days
  stageOrder.forEach(s => stageDwell[s] = []);
  rangedLeads.forEach(l => {
    const hist = (l.stageHistory || []).slice().sort((a,b) => new Date(a.date) - new Date(b.date));
    for (let i = 0; i < hist.length - 1; i++) {
      const stage = hist[i].stage;
      const days = (new Date(hist[i+1].date) - new Date(hist[i].date)) / 86400000;
      if (stageDwell[stage]) stageDwell[stage].push(days);
    }
    // For the current (final) stage, count days since entering it
    if (hist.length) {
      const last = hist[hist.length-1];
      const days = (now - new Date(last.date).getTime()) / 86400000;
      if (!['Closed Won','Closed Lost'].includes(last.stage) && stageDwell[last.stage]) {
        // Don't add — would conflate "in progress" with "completed". Skip.
      }
    }
  });
  const avgDwell = {};
  stageOrder.forEach(s => {
    avgDwell[s] = stageDwell[s].length
      ? Math.round(stageDwell[s].reduce((a,b)=>a+b,0) / stageDwell[s].length)
      : null;
  });

  // ============= OWNER ACTIVITY =============
  const ownerStats = USERS.map(u => {
    const userLeads = rangedLeads.filter(l => l.owner === u.name);
    const userCalls = STATE.calls.filter(c => {
      if (!inRange(c.date)) return false;
      const lead = STATE.leads.find(l => l.id === c.leadId);
      return lead && lead.owner === u.name;
    });
    const userFollowups = (STATE.activities || []).filter(a =>
      a && a.kind && a.owner === u.name && inRange(a.date)
    );
    const userWins = userLeads.filter(l => l.status === 'Closed Won').length;
    return {
      name: u.name,
      colour: u.colour,
      soft: u.soft,
      leads: userLeads.length,
      calls: userCalls.length,
      followups: userFollowups.length,
      wins: userWins
    };
  });
  // Add "unassigned" if any
  const unassigned = rangedLeads.filter(l => !l.owner).length;

  // ============= SECTOR BREAKDOWN =============
  const sectorMap = {};
  rangedLeads.forEach(l => {
    const sec = l.sector || '— No sector —';
    if (!sectorMap[sec]) sectorMap[sec] = { total: 0, won: 0, lost: 0 };
    sectorMap[sec].total++;
    if (l.status === 'Closed Won') sectorMap[sec].won++;
    if (l.status === 'Closed Lost') sectorMap[sec].lost++;
  });
  const sectorRows = Object.keys(sectorMap)
    .map(sec => {
      const m = sectorMap[sec];
      const closed = m.won + m.lost;
      return { sector: sec, total: m.total, won: m.won, winRate: closed > 0 ? Math.round((m.won/closed)*100) : null };
    })
    .sort((a, b) => b.total - a.total);

  // ============= WEEKLY TRENDS =============
  // Leads added per week over the last 12 weeks (always, regardless of range filter)
  const weeks = [];
  const oneWeekMs = 7 * 86400000;
  // Anchor on the start of the current week (Monday-based)
  const today = new Date();
  today.setHours(0,0,0,0);
  const day = today.getDay();
  const mondayOffset = day === 0 ? -6 : 1 - day;
  const thisMonday = new Date(today.getTime() + mondayOffset * 86400000);
  for (let i = 11; i >= 0; i--) {
    const start = new Date(thisMonday.getTime() - i * oneWeekMs);
    const end   = new Date(start.getTime() + oneWeekMs);
    const leads = scopedLeads.filter(l => {
      const c = new Date(l.created).getTime();
      return c >= start.getTime() && c < end.getTime();
    }).length;
    weeks.push({ label: fmtDate(start), count: leads, start, end });
  }
  const maxWeek = Math.max(1, ...weeks.map(w => w.count));

  // ============= RENDER =============
  return `
    <div class="page-head">
      <div>
        <h1 class="page-title">Anal<em>ytics</em></h1>
        <p class="page-sub">${total} lead${total===1?'':'s'} in this window · ${won.length} won · ${lost.length} lost · ${staleLeads.length} stale · ${range === 'all' ? 'all-time view' : 'last ' + range + ' days'}${scope === 'mine' ? ' · only yours' : ''}.</p>
      </div>
      <div class="page-actions">
        <button class="btn btn-ghost" onclick="syncFromBackend().then(render)">↻ Sync</button>
      </div>
    </div>

    ${renderAnalyticsControls(scope, range)}

    <!-- ============= HEADLINE STATS ============= -->
    <div class="stat-grid stat-grid-5">
      <div class="stat">
        <div class="stat-label">Leads</div>
        <div class="stat-value">${total}</div>
        <div class="stat-foot">${range === 'all' ? 'all time' : 'in last ' + range + ' days'}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Open value</div>
        <div class="stat-value" style="font-size:34px;">${fmtMoney(openValue)}</div>
        <div class="stat-foot">/mo · ${fmtMoney(wonValue)}/mo won</div>
      </div>
      <div class="stat">
        <div class="stat-label">Win rate</div>
        <div class="stat-value"><em>${winRate}%</em></div>
        <div class="stat-foot">${won.length} of ${closed} closed</div>
      </div>
      <div class="stat">
        <div class="stat-label">Avg days to close</div>
        <div class="stat-value">${avgDaysToClose !== null ? avgDaysToClose : '—'}</div>
        <div class="stat-foot">${avgDaysToClose !== null ? `across ${closingTimes.length} won lead${closingTimes.length===1?'':'s'}` : 'no wins yet'}</div>
      </div>
      <div class="stat" ${staleLeads.length > 0 ? `style="border-color:var(--rose); cursor:pointer;" onclick="STATE._leadFilter='all'; nav('leads');"` : ''}>
        <div class="stat-label">Stale (30+ days)</div>
        <div class="stat-value" ${staleLeads.length > 0 ? 'style="color:var(--rose);"' : ''}>${staleLeads.length}</div>
        <div class="stat-foot">${staleLeads.length === 0 ? 'all leads fresh' : 'untouched in 30+ days'}</div>
      </div>
    </div>

    <!-- ============= FUNNEL ============= -->
    <div class="card" style="margin-top:24px;">
      <div class="card-head">
        <div>
          <div class="card-title">Conversion funnel</div>
          <div class="card-sub">Leads that ever reached each stage · stage-to-stage conversion shown on the right</div>
        </div>
      </div>
      ${renderFunnelChart(stageOrder, everReached)}
    </div>

    <!-- ============= VELOCITY ============= -->
    <div class="card" style="margin-top:24px;">
      <div class="card-head">
        <div>
          <div class="card-title">Stage velocity</div>
          <div class="card-sub">Average days a lead spends in each stage before moving on · only completed transitions</div>
        </div>
      </div>
      ${renderVelocityChart(stageOrder, avgDwell, stageDwell)}
    </div>

    <!-- ============= OWNER + SECTOR (2-col) ============= -->
    <div class="grid-2" style="margin-top:24px;">
      <div class="card">
        <div class="card-head">
          <div>
            <div class="card-title">Owner activity</div>
            <div class="card-sub">Per-user output in this window</div>
          </div>
        </div>
        ${renderOwnerActivityTable(ownerStats, unassigned)}
      </div>
      <div class="card">
        <div class="card-head">
          <div>
            <div class="card-title">Sector mix</div>
            <div class="card-sub">Where your leads are coming from · win rate per sector</div>
          </div>
        </div>
        ${renderSectorTable(sectorRows)}
      </div>
    </div>

    <!-- ============= TRENDS ============= -->
    <div class="card" style="margin-top:24px;">
      <div class="card-head">
        <div>
          <div class="card-title">Leads added per week</div>
          <div class="card-sub">Last 12 weeks · new leads added by ${scope === 'mine' ? escapeHtml(STATE.currentUser || 'you') : 'everyone'} · ignores time-range filter above</div>
        </div>
      </div>
      ${renderWeeklyTrend(weeks, maxWeek)}
    </div>

    <!-- ============= STALE LEADS ============= -->
    ${staleLeads.length > 0 ? `
      <div class="card" style="margin-top:24px;">
        <div class="card-head">
          <div>
            <div class="card-title" style="color:var(--rose);">Stale leads</div>
            <div class="card-sub">${staleLeads.length} open lead${staleLeads.length===1?'':'s'} with no activity in 30+ days — oldest first</div>
          </div>
        </div>
        ${staleLeads.slice(0, 10).map(l => {
          const days = Math.floor((now - new Date(l.updated || l.created).getTime()) / 86400000);
          return `
            <div style="display:flex; padding:12px 0; border-bottom:1px solid var(--line-soft); align-items:center; gap:12px; cursor:pointer;" onclick="openLead('${l.id}')">
              <div style="flex:1;">
                <div style="font-weight:600;">${escapeHtml(l.companyName)}</div>
                <div class="meta">${escapeHtml(l.sector || '')} · <span class="badge ${stageInfo(l.status).badge}">${escapeHtml(l.status)}</span></div>
              </div>
              ${l.owner ? `<span class="pill" style="background:${userSoft(l.owner)}; color:${userColour(l.owner)}; border-color:${userColour(l.owner)};">${escapeHtml(l.owner)}</span>` : '<span class="pill">unassigned</span>'}
              <span class="mono" style="font-size:11px; color:var(--rose); font-weight:500;">${days}d</span>
              <span style="color:var(--ink-muted);">→</span>
            </div>`;
        }).join('')}
        ${staleLeads.length > 10 ? `<div style="text-align:center; padding-top:12px; font-size:12px; color:var(--ink-muted);">+ ${staleLeads.length - 10} more — see Leads page</div>` : ''}
      </div>` : ''}`;
}

// Scope + range controls
function renderAnalyticsControls(scope, range) {

    <div class="toolbar">
      <div class="view-toggle">
        <button class="${scope==='all'?'active':''}" onclick="STATE._analyticsScope='all'; render();">Everyone</button>

        <option value="90" ${range==='90'?'selected':''}>Last 90 days</option>

        <option value="all" ${range==='all'?'selected':''}>All time</option>
      </select>
    </div>`;
}

// Horizontal funnel chart in SVG
function renderFunnelChart(stages, counts) {
  const max = Math.max(1, ...Object.values(counts));
  const rowHeight = 36;
  const rowGap = 8;
  const labelW = 160;
  const valW = 60;
  const convW = 80;
  const width = 880;
  const chartX = labelW;
  const chartW = width - labelW - valW - convW;
  const height = stages.length * (rowHeight + rowGap);

  let rows = '';
  stages.forEach((stage, i) => {
    const count = counts[stage] || 0;
    const barW = (count / max) * chartW;
    const colours = ANALYTICS_STAGE_COLOURS[stage] || { fill: 'var(--bg-sunken)', stroke: 'var(--line)' };
    const y = i * (rowHeight + rowGap);
    // Conversion from previous stage
    let conv = '';
    if (i > 0) {
      const prev = counts[stages[i-1]] || 0;
      if (prev > 0) conv = Math.round((count / prev) * 100) + '%';
    }
    rows += `
      <text x="${labelW - 10}" y="${y + rowHeight/2 + 4}" text-anchor="end" font-size="12" fill="var(--ink)" font-weight="500">${escapeHtml(stage)}</text>
      <rect x="${chartX}" y="${y}" width="${Math.max(2, barW)}" height="${rowHeight}" fill="${colours.fill}" stroke="${colours.stroke}" stroke-width="1" rx="3"/>
      <text x="${chartX + Math.max(2, barW) + 8}" y="${y + rowHeight/2 + 4}" font-size="13" fill="var(--ink)" font-weight="600" font-family="Geist Mono, monospace">${count}</text>
      ${conv ? `<text x="${width - 8}" y="${y + rowHeight/2 + 4}" text-anchor="end" font-size="11" fill="var(--ink-muted)" font-family="Geist Mono, monospace">↓ ${conv}</text>` : ''}`;
  });
  return `<svg viewBox="0 0 ${width} ${height}" style="width:100%; height:auto; display:block;" xmlns="http://www.w3.org/2000/svg">${rows}</svg>`;
}

// Stage velocity bar chart in SVG
function renderVelocityChart(stages, avgDays, samples) {
  // Only include stages where we have samples
  const measurable = stages.filter(s => avgDays[s] !== null && !['Closed Won','Closed Lost'].includes(s));
  if (measurable.length === 0) {
    return `<div class="empty"><div class="serif">No stage transitions yet</div><div>Move leads through the pipeline to see velocity data.</div></div>`;
  }
  const max = Math.max(1, ...measurable.map(s => avgDays[s]));
  const rowHeight = 32;
  const rowGap = 6;
  const labelW = 160;
  const valW = 110;
  const width = 880;
  const chartX = labelW;
  const chartW = width - labelW - valW;
  const height = measurable.length * (rowHeight + rowGap);

  let rows = '';
  measurable.forEach((stage, i) => {
    const days = avgDays[stage];
    const sample = samples[stage].length;
    const barW = (days / max) * chartW;
    const colours = ANALYTICS_STAGE_COLOURS[stage] || { fill: 'var(--bg-sunken)', stroke: 'var(--line)' };
    const y = i * (rowHeight + rowGap);
    rows += `
      <text x="${labelW - 10}" y="${y + rowHeight/2 + 4}" text-anchor="end" font-size="12" fill="var(--ink)" font-weight="500">${escapeHtml(stage)}</text>
      <rect x="${chartX}" y="${y}" width="${Math.max(2, barW)}" height="${rowHeight}" fill="${colours.fill}" stroke="${colours.stroke}" stroke-width="1" rx="3"/>
      <text x="${chartX + Math.max(2, barW) + 8}" y="${y + rowHeight/2 + 4}" font-size="12" fill="var(--ink)" font-weight="600" font-family="Geist Mono, monospace">${days}d</text>
      <text x="${chartX + Math.max(2, barW) + 8}" y="${y + rowHeight/2 + 4}" dx="38" font-size="10" fill="var(--ink-muted)">n=${sample}</text>`;
  });
  return `<svg viewBox="0 0 ${width} ${height}" style="width:100%; height:auto; display:block;" xmlns="http://www.w3.org/2000/svg">${rows}</svg>`;
}

  return `
    <table class="table" style="margin-top:0;">
      <thead>
        <tr><th>Owner</th><th style="text-align:right;">Leads</th><th style="text-align:right;">Calls</th><th style="text-align:right;">Follow-ups</th><th style="text-align:right;">Wins</th></tr>
      </thead>
      <tbody>
        ${ownerStats.map(o => `
          <tr>
            <td><span class="pill" style="background:${o.soft}; color:${o.colour}; border-color:${o.colour};">${escapeHtml(o.name)}</span></td>
            <td style="text-align:right; font-family:'Geist Mono', monospace;">${o.leads}</td>
            <td style="text-align:right; font-family:'Geist Mono', monospace;">${o.calls}</td>
            <td style="text-align:right; font-family:'Geist Mono', monospace;">${o.followups}</td>
            <td style="text-align:right; font-family:'Geist Mono', monospace; font-weight:600; color:${o.wins > 0 ? 'var(--emerald)' : 'var(--ink-muted)'};">${o.wins}</td>

// Sector breakdown table with mini-bars for distribution
function renderSectorTable(sectorRows) {
  if (sectorRows.length === 0) return '<div class="empty"><div class="serif">No sectors tracked</div></div>';
  const max = Math.max(...sectorRows.map(s => s.total));
  return `
    <table class="table" style="margin-top:0;">
      <thead>
        <tr><th>Sector</th><th style="width:120px;">Distribution</th><th style="text-align:right;">Leads</th><th style="text-align:right;">Win rate</th></tr>
      </thead>
      <tbody>
        ${sectorRows.map(s => {
          const pct = (s.total / max) * 100;
          // Short sector label — strip the "Sector — Certs" suffix where present
          const shortLabel = (s.sector || '').split('—')[0].split(' / ')[0].trim();
          return `
            <tr>
              <td title="${escapeHtml(s.sector)}"><strong style="font-size:12px;">${escapeHtml(shortLabel)}</strong></td>
              <td>
                <div style="background:var(--bg-sunken); height:10px; border-radius:3px; overflow:hidden;">
                  <div style="background:var(--ink); height:100%; width:${pct}%;"></div>
                </div>
              </td>
              <td style="text-align:right; font-family:'Geist Mono', monospace;">${s.total}</td>
              <td style="text-align:right; font-family:'Geist Mono', monospace; font-weight:600; ${s.winRate !== null ? (s.winRate >= 30 ? 'color:var(--emerald);' : s.winRate === 0 ? 'color:var(--rose);' : '') : 'color:var(--ink-muted);'}">${s.winRate !== null ? s.winRate + '%' : '—'}</td>
            </tr>`;
        }).join('')}
      </tbody>
    </table>`;
}

// Weekly trend line chart in SVG
function renderWeeklyTrend(weeks, maxWeek) {
  const width = 880;
  const height = 200;
  const padTop = 20;
  const padBot = 30;
  const padLeft = 30;
  const padRight = 20;
  const chartW = width - padLeft - padRight;
  const chartH = height - padTop - padBot;
  const stepX = chartW / Math.max(1, weeks.length - 1);

  const points = weeks.map((w, i) => {
    const x = padLeft + i * stepX;
    const y = padTop + chartH - (maxWeek > 0 ? (w.count / maxWeek) * chartH : 0);
    return { x, y, w };
  });

  // Y-axis ticks: 0, mid, max
  const midY = padTop + chartH / 2;
  const topY = padTop;
  const botY = padTop + chartH;

  // Build polyline + filled area
  const pathLine = points.map(p => `${p.x},${p.y}`).join(' ');
  const pathArea = `${padLeft},${botY} ${pathLine} ${points[points.length-1].x},${botY} Z`;

  // X-axis labels — every 2nd week to avoid crowding
  const xLabels = points.map((p, i) => {
    if (i % 2 !== 0 && i !== points.length - 1) return '';
    return `<text x="${p.x}" y="${height - 8}" text-anchor="middle" font-size="10" fill="var(--ink-muted)" font-family="Geist Mono, monospace">${escapeHtml(p.w.label)}</text>`;
  }).join('');

  // Dots + value labels on the points
  const dots = points.map(p => `
    <circle cx="${p.x}" cy="${p.y}" r="3" fill="var(--accent)" stroke="var(--bg-elevated)" stroke-width="2"/>
    ${p.w.count > 0 ? `<text x="${p.x}" y="${p.y - 8}" text-anchor="middle" font-size="10" fill="var(--ink)" font-weight="600" font-family="Geist Mono, monospace">${p.w.count}</text>` : ''}`).join('');

  return `
    <svg viewBox="0 0 ${width} ${height}" style="width:100%; height:auto; display:block;" xmlns="http://www.w3.org/2000/svg">
      <!-- gridlines -->
      <line x1="${padLeft}" y1="${topY}" x2="${width - padRight}" y2="${topY}" stroke="var(--line-soft)" stroke-dasharray="2,3"/>
      <line x1="${padLeft}" y1="${midY}" x2="${width - padRight}" y2="${midY}" stroke="var(--line-soft)" stroke-dasharray="2,3"/>
      <line x1="${padLeft}" y1="${botY}" x2="${width - padRight}" y2="${botY}" stroke="var(--line)"/>
      <!-- y labels -->
      <text x="${padLeft - 6}" y="${topY + 4}" text-anchor="end" font-size="10" fill="var(--ink-muted)" font-family="Geist Mono, monospace">${maxWeek}</text>
      <text x="${padLeft - 6}" y="${midY + 4}" text-anchor="end" font-size="10" fill="var(--ink-muted)" font-family="Geist Mono, monospace">${Math.round(maxWeek/2)}</text>
      <text x="${padLeft - 6}" y="${botY + 4}" text-anchor="end" font-size="10" fill="var(--ink-muted)" font-family="Geist Mono, monospace">0</text>
      <!-- filled area under the line -->
      <polygon points="${pathArea}" fill="var(--accent-soft)" opacity="0.5"/>
      <!-- the line -->
      <polyline points="${pathLine}" fill="none" stroke="var(--accent)" stroke-width="2"/>
      <!-- dots + labels -->
      ${dots}
      <!-- x labels -->
      ${xLabels}
    </svg>`;
}

/* ============================================================
   ACTIVITY LOG PAGE
   ============================================================ */
function renderActivityLog() {
  const filter = STATE._activityFilter || 'all';
  let list = [...STATE.changes];
  if (filter !== 'all') list = list.filter(c => c.kind === filter);
  list.sort((a,b) => new Date(b.date) - new Date(a.date));

  const counts = {
    stage:  STATE.changes.filter(c => c.kind === 'stage').length,
    owner:  STATE.changes.filter(c => c.kind === 'owner').length,
    delete: STATE.changes.filter(c => c.kind === 'delete').length,
    create: STATE.changes.filter(c => c.kind === 'create').length,
    qualify: STATE.changes.filter(c => c.kind === 'qualify' || c.kind === 'disqualify').length
  };
  const lastDate = STATE.changes.length ? STATE.changes[STATE.changes.length-1].date : null;

  return `
    <div class="page-head">
      <div>
        <h1 class="page-title">Audit <em>log</em></h1>
        <p class="page-sub">Audit trail of every meaningful system change — who did what, when. For manually-logged calls, visits and follow-ups, see <a href="#" onclick="event.preventDefault(); nav('followups')" style="color:var(--accent); text-decoration:none; border-bottom:1px solid var(--accent);">Follow-ups</a>. ${lastDate ? 'Last entry ' + fmtDateTime(lastDate) : ''}</p>
      </div>
      <div class="page-actions">
        <button class="btn btn-ghost" onclick="syncFromBackend().then(render)">↻ Sync</button>
        <button class="btn btn-ghost" onclick="exportChangesCsv()">↓ Export CSV</button>
      </div>
    </div>
    <div class="stat-grid">
      <div class="stat"><div class="stat-label">Stage changes</div><div class="stat-value">${counts.stage}</div></div>
      <div class="stat"><div class="stat-label">Qualified/Disqualified</div><div class="stat-value"><em>${counts.qualify}</em></div></div>
      <div class="stat"><div class="stat-label">Created</div><div class="stat-value">${counts.create}</div></div>
      <div class="stat"><div class="stat-label">Deleted</div><div class="stat-value">${counts.delete}</div></div>
    </div>
    <div class="toolbar">
      <select class="select" id="activityFilter">
        <option value="all" ${filter==='all'?'selected':''}>All changes</option>
        <option value="stage" ${filter==='stage'?'selected':''}>Stage changes</option>
        <option value="qualify" ${filter==='qualify'?'selected':''}>Qualified</option>
        <option value="disqualify" ${filter==='disqualify'?'selected':''}>Disqualified</option>
        <option value="owner" ${filter==='owner'?'selected':''}>Owner changes</option>
        <option value="create" ${filter==='create'?'selected':''}>Created</option>
        <option value="delete" ${filter==='delete'?'selected':''}>Deleted</option>
      </select>
    </div>
    ${list.length === 0 ? `
      <div class="card"><div class="empty"><div class="serif">No activity yet</div><div>Changes will appear here as you work.</div></div></div>
    ` : `
      <div class="card" style="padding:0;">
        ${list.map(c => `
          <div class="activity-row" onclick="${c.leadId && STATE.leads.find(l => l.id === c.leadId) ? `openLead('${c.leadId}')` : ''}">
            <div class="activity-time">${fmtDateTime(c.date)}</div>
            <div><span class="activity-kind ${c.kind === 'disqualify' ? 'qualify' : c.kind}">${c.kind}</span></div>
            <div class="activity-detail"><strong>${escapeHtml(c.companyName || '—')}</strong> — ${escapeHtml(c.summary || '')}</div>
            <div>${ownerPillHtml(c.user)}</div>
          </div>`).join('')}
      </div>`}`;
}

function exportChangesCsv() {
  const rows = [['Date', 'User', 'Kind', 'Company', 'Lead ID', 'Summary']];
  STATE.changes.forEach(c => {
    rows.push([c.date, c.user, c.kind, c.companyName, c.leadId, c.summary]);
  });
  const csv = rows.map(r => r.map(c => `"${String(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  download('pursuit-activity-' + Date.now() + '.csv', csv, 'text/csv');
}
