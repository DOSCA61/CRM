   ============================================================ */
/* ============================================================
   PIPELINE — dispatcher between Kanban (default) and Timeline
   ============================================================ */
function renderPipeline() {
  const unqualifiedCount = STATE.leads.filter(isUnqualified).length;
  if (STATE.leads.length === 0) {
    return `
      <div class="page-head">
        <div>
          <h1 class="page-title">Pipeline</h1>
          <p class="page-sub">Stage-based view of every lead in your pipeline.</p>
        </div>
      </div>
      <div class="card"><div class="empty">
        <div class="serif">No leads to track yet</div>
        <button class="btn btn-accent" style="margin-top:16px;" onclick="nav('generate')">Generate Leads</button>
      </div></div>`;
  }
  STATE._pipelineUnqualifiedCount = unqualifiedCount;
  if (STATE._pipelineView === 'timeline') return renderPipelineTimeline();
  return renderPipelineKanban();
}

function renderShowUnqualifiedToggle() {
  const on = !!STATE._showUnqualified;
  const count = STATE._pipelineUnqualifiedCount || 0;
  return `<button class="toggle-pill ${on?'on':''}" onclick="STATE._showUnqualified = !STATE._showUnqualified; render();"><span class="dot"></span>Show unqualified (${count})</button>`;
}

function pipelineFilteredLeads() {
  if (STATE._showUnqualified) return [...STATE.leads];
  return STATE.leads.filter(l => !isUnqualified(l));
}
function pipelineActiveStages() {
  if (STATE._showUnqualified) return STAGES;
  return STAGES.filter(s => s.key !== 'Initial Contact' && s.key !== 'BANT');
}

function renderViewToggle(current) {
  return `
    <div class="view-toggle">
      <button class="${current==='kanban'?'active':''}" onclick="STATE._pipelineView='kanban'; render();">Kanban</button>
      <button class="${current==='timeline'?'active':''}" onclick="STATE._pipelineView='timeline'; render();">Timeline</button>
    </div>`;
}

/* ============================================================
   PIPELINE — KANBAN VIEW
   ============================================================ */
function renderPipelineKanban() {
  const stages = pipelineActiveStages();
  const leads = pipelineFilteredLeads();
  const unqualifiedCount = STATE._pipelineUnqualifiedCount || 0;
  // Group leads by status
  const byStage = {};
  stages.forEach(s => byStage[s.key] = []);
  leads.forEach(l => {
    const key = byStage.hasOwnProperty(l.status) ? l.status : stages[0].key;
    byStage[key].push(l);
  });
  // Sort each column by most-recently-updated first
  Object.keys(byStage).forEach(k => {
    byStage[k].sort((a,b) => new Date(b.updated||b.created) - new Date(a.updated||a.created));
  });

  return `
    <div class="page-head">
      <div>
        <h1 class="page-title">Pipeline</h1>
        <p class="page-sub">Qualified leads only. Drag any card between columns to move that lead through the pipeline. ${unqualifiedCount > 0 ? `<a href="#" onclick="event.preventDefault(); nav('qualification');" style="color:var(--accent);">${unqualifiedCount} awaiting qualification →</a>` : ''}</p>
      </div>
      <div class="page-actions">
        ${renderShowUnqualifiedToggle()}
        ${renderViewToggle('kanban')}
        <button class="btn btn-ghost" onclick="syncFromBackend().then(render)">↻ Sync</button>
      </div>
    </div>
    <div class="kanban" id="kanbanBoard">
      ${stages.map(stage => renderKanbanColumn(stage, byStage[stage.key])).join('')}
    </div>`;
}

function renderKanbanColumn(stage, leads) {
  const borderColor = getStageBorder(stage.key);
  return `
    <div class="kanban-col"
         data-stage="${escapeHtml(stage.key)}"
         ondragover="kanbanDragOver(event)"
         ondragenter="kanbanDragEnter(event)"
         ondragleave="kanbanDragLeave(event)"
         ondrop="kanbanDrop(event, '${escapeHtml(stage.key)}')">
      <div class="kanban-col-head" style="border-bottom-color:${borderColor};">
        <div class="kanban-col-title">${escapeHtml(stage.key)}</div>
        <div class="kanban-col-count">${leads.length}</div>
      </div>
      <div class="kanban-cards">
        ${leads.length === 0 ? '<div class="kanban-empty">drop leads here</div>' :
          leads.map(l => renderKanbanCard(l, stage)).join('')}
      </div>
    </div>`;
}

function renderKanbanCard(lead, stage) {
  const lastChange = (lead.stageHistory && lead.stageHistory.length)
    ? new Date(lead.stageHistory[lead.stageHistory.length - 1].date)
    : new Date(lead.created);
  const daysInStage = Math.max(0, Math.floor((Date.now() - lastChange) / 86400000));
  // Stale threshold: longer than 14 days in an active stage
  const isActive = !['Closed Won', 'Closed Lost'].includes(lead.status);
  const stale = isActive && daysInStage > 14;
  // Short sector (strip everything after dash)
  const shortSector = (lead.sector || '').split('—')[0].split('/')[0].trim();
  const val = Number(lead.value) || 0;
  return `
    <div class="kanban-card"
         draggable="true"
         data-lead-id="${lead.id}"
         style="border-left-color:${getStageBorder(stage.key)};"
         ondragstart="kanbanDragStart(event, '${lead.id}')"
         ondragend="kanbanDragEnd(event)"
         onclick="kanbanCardClick(event, '${lead.id}')">
      <div class="kanban-card-company">${escapeHtml(lead.companyName)}</div>
      <div class="kanban-card-contact">${escapeHtml(lead.contactName || '—')}${lead.title ? ' · ' + escapeHtml(lead.title) : ''}</div>
      <div class="kanban-card-meta">
        ${shortSector ? `<span class="kanban-card-pill">${escapeHtml(shortSector)}</span>` : ''}
        ${val > 0 ? `<span class="kanban-card-pill" style="border-color:var(--emerald); color:var(--emerald); background:var(--emerald-soft);" title="Deal value per month">${fmtMoney(val)}/mo</span>` : ''}
        ${ownerPillHtml(lead.owner)}
        <span class="kanban-card-days ${stale ? 'stale' : ''}" title="Days in this stage">${daysInStage}d</span>
      </div>
    </div>`;
}

/* ============================================================
   KANBAN DRAG-AND-DROP
   ============================================================ */
let kanbanDragId = null;

function kanbanDragStart(e, leadId) {
  kanbanDragId = leadId;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', leadId);
  e.currentTarget.classList.add('dragging');
}

function kanbanDragEnd(e) {
  kanbanDragId = null;
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.kanban-col.drop-active').forEach(c => {
    c.classList.remove('drop-active');
    c._dragDepth = 0;
  });
}

function kanbanDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
}

function kanbanDragEnter(e) {
  const col = e.currentTarget;
  col._dragDepth = (col._dragDepth || 0) + 1;
  col.classList.add('drop-active');
}

function kanbanDragLeave(e) {
  const col = e.currentTarget;
  col._dragDepth = (col._dragDepth || 1) - 1;
  if (col._dragDepth <= 0) {
    col.classList.remove('drop-active');
    col._dragDepth = 0;
  }
}

async function kanbanDrop(e, stageKey) {
  e.preventDefault();
  const col = e.currentTarget;
  col.classList.remove('drop-active');
  col._dragDepth = 0;
  const leadId = e.dataTransfer.getData('text/plain') || kanbanDragId;
  if (!leadId) return;
  const lead = STATE.leads.find(l => l.id === leadId);
  if (!lead) return;
  if (lead.status === stageKey) return; // no-op if dropped in same column
  if (!ensureCurrentUser()) return;
  // Update
  const previousStatus = lead.status;
  lead.status = stageKey;
  lead.updated = new Date().toISOString();
  lead.lastModifiedBy = STATE.currentUser;
  lead.lastModifiedAt = lead.updated;
  lead.stageHistory = lead.stageHistory || [];
  lead.stageHistory.push({ stage: stageKey, date: new Date().toISOString(), user: STATE.currentUser, note: `Moved from ${previousStatus}` });
  saveLocal();
  pushLead(lead);
  logChange('stage', lead.id, `${previousStatus} → ${stageKey}`);
  toast(`${lead.companyName} → ${stageKey}`, 'success');
  render();
}

// Click-vs-drag detection for cards: HTML5 drag suppresses click anyway,
// but this guards against accidental opens after a quick drag.
function kanbanCardClick(e, leadId) {
  // If a drag just ended in the last 100ms, skip click
  if (e.defaultPrevented) return;
  openLead(leadId);
}

/* ============================================================
   PIPELINE — TIMELINE VIEW (Gantt with date bars)
   ============================================================ */
function renderPipelineTimeline() {
  const leads = pipelineFilteredLeads();
  const unqualifiedCount = STATE._pipelineUnqualifiedCount || 0;
  // Find date range
  let minDate = new Date();
  let maxDate = new Date();
  leads.forEach(l => {
    (l.stageHistory || []).forEach(h => {
      const d = new Date(h.date);
      if (d < minDate) minDate = d;
      if (d > maxDate) maxDate = d;
    });
    const created = new Date(l.created);
    if (created < minDate) minDate = created;
  });
  // Add padding
  minDate = new Date(minDate.getTime() - 86400000 * 2);
  maxDate = new Date(Math.max(maxDate.getTime(), Date.now()) + 86400000 * 5);
  const totalDays = Math.max(7, daysBetween(minDate, maxDate));

  // Generate week markers
  const cols = [];
  let cur = new Date(minDate);
  while (cur <= maxDate) {
    cols.push(new Date(cur));
    cur.setDate(cur.getDate() + 7);
  }

  const headerCols = cols.map(d => `<div class="gantt-date-col">${fmtDate(d)}</div>`).join('');
  const gridCols = cols.map(() => `<div class="gantt-grid-col"></div>`).join('');

  // Build rows
  const rowsHtml = leads.map(l => {
    const history = [...(l.stageHistory || [])].sort((a,b) => new Date(a.date) - new Date(b.date));
    if (history.length === 0) return '';
    const bars = [];
    for (let i = 0; i < history.length; i++) {
      const stage = history[i].stage;
      const start = new Date(history[i].date);
      const isLast = i === history.length - 1;
      const end = !isLast ? new Date(history[i+1].date) : (['Closed Won','Closed Lost'].includes(l.status) ? start : new Date());
      const startPct = (daysBetween(minDate, start) / totalDays) * 100;
      const widthPct = Math.max(2, (daysBetween(start, end) / totalDays) * 100);
      const cls = stageInfo(stage).class;
      const handleHtml = !isLast ? '<div class="gantt-bar-handle" data-handle="right"></div>' : '';
      bars.push(`<div class="gantt-bar ${cls}"
        data-lead-id="${l.id}"
        data-stage-idx="${i}"
        data-is-last="${isLast}"
        style="left:${startPct}%; width:${widthPct}%; top:14px;"
        title="${escapeHtml(stage)} — ${fmtDate(start)} to ${fmtDate(end)}${isLast ? ' (current)' : ''}">${escapeHtml(stage)}${handleHtml}</div>`);
    }
    return `
      <div class="gantt-row">
        <div class="gantt-name" onclick="openLead('${l.id}')" style="cursor:pointer;">
          <div class="company">${escapeHtml(l.companyName)}</div>
          <div class="meta">${escapeHtml(l.contactName || '—')} · ${escapeHtml(l.sector || '')}</div>
        </div>
        <div class="gantt-timeline">
          <div class="gantt-grid" style="grid-template-columns:repeat(${cols.length}, 1fr);">${gridCols}</div>
          ${bars.join('')}
        </div>
      </div>`;
  }).join('');

  const legend = STAGES.map(s => `<span class="pill"><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:${getStageBg(s.key)};border:1px solid ${getStageBorder(s.key)};"></span>${s.key}</span>`).join(' ');

  return `
    <div class="page-head">
      <div>
        <h1 class="page-title">Pipeline <em>timeline</em></h1>
        <p class="page-sub">Historical timeline. <strong>Drag any bar</strong> to fix when a stage happened. Drag the right edge to change when the next stage started. ${unqualifiedCount > 0 ? `<a href="#" onclick="event.preventDefault(); nav('qualification');" style="color:var(--accent);">${unqualifiedCount} awaiting qualification →</a>` : ''}</p>
      </div>
      <div class="page-actions">
        ${renderShowUnqualifiedToggle()}
        ${renderViewToggle('timeline')}
        <button class="btn btn-ghost" onclick="syncFromBackend().then(render)">↻ Sync</button>
      </div>
    </div>
    <div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px;">${legend}</div>
    <div class="gantt-wrap" id="ganttWrap" data-min-date="${minDate.getTime()}" data-total-days="${totalDays}">
      <div class="gantt-head">
        <div class="gantt-name" style="padding:12px 16px; font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:0.12em; color:var(--ink-muted);">Lead</div>
        <div class="gantt-date-axis" style="grid-template-columns:repeat(${cols.length}, 1fr);">${headerCols}</div>
      </div>
      ${rowsHtml}
    </div>`;
}

function getStageBg(stage) {
  const map = {
    'Initial Contact':'var(--blue-soft)', 'BANT':'var(--gold-soft)', 'Call Made':'var(--accent-soft)',
    'Response Received':'#e8d9f0', 'CTA Agreed':'var(--emerald-soft)', 'Closed Won':'var(--emerald)', 'Closed Lost':'var(--rose-soft)'
  };
  return map[stage] || '#ccc';
}
function getStageBorder(stage) {
  const map = {
    'Initial Contact':'var(--blue)', 'BANT':'var(--gold)', 'Call Made':'var(--accent)',
    'Response Received':'#6b2c8a', 'CTA Agreed':'var(--emerald)', 'Closed Won':'var(--emerald)', 'Closed Lost':'var(--rose)'
  };
  return map[stage] || '#666';
}

/* ============================================================
   GANTT DRAG-AND-DROP
   ============================================================ */
let ganttDrag = null; // active drag operation state

function snapToDay(ms) {
  // Snap a timestamp to local-midnight of that day for clean dates
  const d = new Date(ms);
  d.setHours(0, 0, 0, 0);
  return d.getTime();
}

function bindGanttDrag() {
  const wrap = document.getElementById('ganttWrap');
  if (!wrap) return;
  const minDateMs = parseInt(wrap.dataset.minDate);
  const totalDays = parseInt(wrap.dataset.totalDays);

  wrap.querySelectorAll('.gantt-bar').forEach(bar => {
    bar.addEventListener('mousedown', e => startGanttDrag(e, bar, minDateMs, totalDays));
    bar.addEventListener('touchstart', e => startGanttDrag(e, bar, minDateMs, totalDays), { passive: false });
    // Click-to-open lead (only if no drag happened)
    bar.addEventListener('click', e => {
      if (ganttDrag && ganttDrag.moved) { e.preventDefault(); return; }
      const leadId = bar.dataset.leadId;
      if (leadId) openLead(leadId);
    });
  });
}

function startGanttDrag(e, bar, minDateMs, totalDays) {
  // If user grabbed the right-edge handle, this is a "resize" operation:
  // dragging that edge actually moves the NEXT stage's start date.
  const isHandle = e.target.dataset.handle === 'right';
  const isLast = bar.dataset.isLast === 'true';
  const timeline = bar.parentElement;
  const timelineRect = timeline.getBoundingClientRect();
  const pixelsPerDay = timelineRect.width / totalDays;

  const lead = STATE.leads.find(l => l.id === bar.dataset.leadId);
  if (!lead || !lead.stageHistory) return;
  const sorted = [...lead.stageHistory].sort((a,b) => new Date(a.date) - new Date(b.date));
  const idx = parseInt(bar.dataset.stageIdx);

  // Which stage entry we'll actually mutate:
  // - Bar body drag → this stage's date (sorted[idx])
  // - Right-edge handle → next stage's date (sorted[idx+1])
  const targetIdx = isHandle ? idx + 1 : idx;
  if (targetIdx >= sorted.length) return; // can't drag last bar's right edge
  if (targetIdx === 0 && isHandle === false) {
    // First stage: still draggable but its date is also the "lead created" anchor.
    // Allow it but warn on save.
  }

  e.preventDefault();
  const pt = e.touches ? e.touches[0] : e;
  ganttDrag = {
    bar, lead, sorted, targetIdx, isHandle, isLast,
    startX: pt.clientX,
    startLeft: parseFloat(bar.style.left),
    startWidth: parseFloat(bar.style.width),
    pixelsPerDay,
    minDateMs,
    totalDays,
    originalDateMs: new Date(sorted[targetIdx].date).getTime(),
    moved: false,
    timelineRect
  };
  bar.classList.add('dragging');

  document.addEventListener('mousemove', onGanttDrag);
  document.addEventListener('mouseup', endGanttDrag);
  document.addEventListener('touchmove', onGanttDrag, { passive: false });
  document.addEventListener('touchend', endGanttDrag);
}

function onGanttDrag(e) {
  if (!ganttDrag) return;
  e.preventDefault();
  const pt = e.touches ? e.touches[0] : e;
  const dx = pt.clientX - ganttDrag.startX;
  if (Math.abs(dx) > 3) ganttDrag.moved = true;

  const daysDelta = dx / ganttDrag.pixelsPerDay;
  let newDateMs = ganttDrag.originalDateMs + daysDelta * 86400000;

  // Clamp: can't go before previous stage or after next stage
  const prev = ganttDrag.sorted[ganttDrag.targetIdx - 1];
  const next = ganttDrag.sorted[ganttDrag.targetIdx + 1];
  if (prev) {
    const prevMs = new Date(prev.date).getTime() + 60_000; // at least 1 min after
    if (newDateMs < prevMs) newDateMs = prevMs;
  }
  if (next) {
    const nextMs = new Date(next.date).getTime() - 60_000;
    if (newDateMs > nextMs) newDateMs = nextMs;
  }
  // Also can't go past "now" for the current (in-progress) stage
  if (!ganttDrag.sorted[ganttDrag.targetIdx + 1] && newDateMs > Date.now()) {
    newDateMs = Date.now();
  }

  ganttDrag.previewDateMs = newDateMs;

  // Update bar position visually
  if (ganttDrag.isHandle) {
    // Right-edge drag: only the width of THIS bar changes
    const newWidthPct = ((newDateMs - new Date(ganttDrag.sorted[ganttDrag.targetIdx - 1].date).getTime()) / 86400000 / ganttDrag.totalDays) * 100;
    ganttDrag.bar.style.width = Math.max(0.5, newWidthPct) + '%';
  } else {
    // Bar-body drag: this bar's left shifts, and width adjusts so right edge stays at next-stage-start (or "now")
    const newLeftPct = ((newDateMs - ganttDrag.minDateMs) / 86400000 / ganttDrag.totalDays) * 100;
    const rightDateMs = next ? new Date(next.date).getTime() : (ganttDrag.isLast ? Date.now() : new Date(ganttDrag.sorted[ganttDrag.targetIdx].date).getTime());
    const newWidthPct = ((rightDateMs - newDateMs) / 86400000 / ganttDrag.totalDays) * 100;
    ganttDrag.bar.style.left = newLeftPct + '%';
    ganttDrag.bar.style.width = Math.max(0.5, newWidthPct) + '%';
  }

  // Show date tooltip
  showDragTooltip(pt.clientX, ganttDrag.bar.getBoundingClientRect().top, fmtDateTime(newDateMs));
}

function showDragTooltip(x, y, text) {
  let tip = document.getElementById('ganttDragTooltip');
  if (!tip) {
    tip = document.createElement('div');
    tip.id = 'ganttDragTooltip';
    tip.className = 'gantt-drag-tooltip';
    document.body.appendChild(tip);
  }
  tip.style.left = x + 'px';
  tip.style.top = y + 'px';
  tip.textContent = text;
}

function endGanttDrag(e) {
  if (!ganttDrag) return;
  const d = ganttDrag;
  ganttDrag = null;
  d.bar.classList.remove('dragging');
  document.removeEventListener('mousemove', onGanttDrag);
  document.removeEventListener('mouseup', endGanttDrag);
  document.removeEventListener('touchmove', onGanttDrag);
  document.removeEventListener('touchend', endGanttDrag);
  const tip = document.getElementById('ganttDragTooltip');
  if (tip) tip.remove();

  if (!d.moved || d.previewDateMs == null) return; // was a click, not a drag

  // Snap to day and persist
  const newDateMs = snapToDay(d.previewDateMs);
  // Find the actual stageHistory entry on the lead (sorted may differ from original order if dates were equal)
  const targetEntry = d.sorted[d.targetIdx];
  const liveEntry = d.lead.stageHistory.find(h =>
    h.stage === targetEntry.stage && h.date === targetEntry.date
  );
  if (!liveEntry) {
    toast('Could not find stage entry to update', 'error');
    render();
    return;
  }
  const oldDate = liveEntry.date;
  liveEntry.date = new Date(newDateMs).toISOString();
  // Resort to keep chronological order
  d.lead.stageHistory.sort((a,b) => new Date(a.date) - new Date(b.date));
  d.lead.updated = new Date().toISOString();
  saveLocal();
  pushLead(d.lead);
  toast(`Moved "${liveEntry.stage}" to ${fmtDate(newDateMs)}`, 'success');
  // Re-render so the timeline range and bar layout settle correctly
  render();
}

// Inner HTML of the coaching panel — re-rendered on the 1s tick.
function renderCoachPanelInner() {
  const rec = STATE.recording;
  const now = Date.now();
  const c = STATE.coach;
  const monologueSec = (rec && c.monologueStartMs) ? Math.floor((now - c.monologueStartMs) / 1000) : 0;
  let talkClass = '';
  if (monologueSec >= 60) talkClass = 'bad';
  else if (monologueSec >= 30) talkClass = 'warn';
  const talkHint = monologueSec >= 60 ? 'Stop — ask a question'
                 : monologueSec >= 30 ? 'You\'re running long'
                 : 'Healthy';
  const pauseSec = (rec && c.lastSpeechMs) ? Math.floor((now - c.lastSpeechMs) / 1000) : 0;
  const pauseHint = pauseSec >= 3 ? 'Good — let them fill it' : 'Live';
  const chip = COACH_CHIPS[c.chipIdx % COACH_CHIPS.length];
  const nextChip = COACH_CHIPS[(c.chipIdx + 1) % COACH_CHIPS.length];
  const checks = coachChecklist();
  return `
    <div class="coach-tile">
      <div class="coach-tile-label">Talk time — are you monologuing?</div>
      <div class="coach-bignum ${talkClass}">${rec ? monologueSec + 's' : '—'}</div>
      <div class="coach-sub">${rec ? talkHint : 'Starts when you record'} · resets on each pause</div>
    </div>
    <div class="coach-tile">
      <div class="coach-tile-label">Pause</div>
      <div class="coach-bignum ${pauseSec >= 3 ? 'warn' : ''}">${rec ? pauseSec + 's' : '—'}</div>
      <div class="coach-sub">${rec ? pauseHint : 'Silence since they last spoke'}</div>
    </div>
    <div class="coach-tile">
      <div class="coach-tile-label">Right now</div>
      <div class="coach-chip-now">${escapeHtml(chip)}</div>
      <div class="coach-chip-next">next: ${escapeHtml(nextChip)}</div>
    </div>
    <div class="coach-tile">
      <div class="coach-tile-label">Playbook checklist</div>
      ${checks.map(ck => `
        <div class="coach-check ${ck.done ? 'done' : ''}">
          <span class="box">${ck.done ? '✓' : ''}</span>
          <span>${escapeHtml(ck.label)}</span>
        </div>`).join('')}
    </div>
    <div class="coach-tile">
      <div class="coach-tile-label">Stuck?</div>
      <button class="btn btn-accent" id="coachNudgeBtn" style="width:100%;" ${c.nudgeBusy ? 'disabled' : ''}>
        ${c.nudgeBusy ? '<span class="spinner"></span> Thinking…' : 'What should I say next?'}
      </button>
      <div id="coachNudgeOut"></div>
    </div>`;
}

function coachChecklist() {
  const t = (STATE.currentTranscript || '').toLowerCase();
  const has = (...words) => words.some(w => t.includes(w));
  return [
    { label: 'Opened / built rapport', done: t.length > 40 },
    { label: 'Asked about their needs', done: has('what', 'how do you', 'tell me', 'challenge', 'problem', 'currently') },
    { label: 'Named a risk / cost',     done: has('risk', 'fine', 'closure', 'prosecution', 'inspection', 'penalty', 'liability', 'claim', 'audit') },
    { label: 'Discussed budget',        done: has('budget', 'cost', 'price', 'invest', 'spend', 'afford', '€', 'euro') },
    { label: 'Found the decision-maker',done: has('decision', 'sign off', 'who else', 'approve', 'director', 'owner', 'board') },
    { label: 'Agreed a next step',      done: has('next step', 'follow up', 'send you', 'call you', 'meeting', 'pilot', 'demo', 'diary', 'calendar') }
  ];
}

function refreshCoachPanel() {
  const panel = document.getElementById('coachPanel');
  if (panel) {
    panel.innerHTML = renderCoachPanelInner();
    document.getElementById('coachNudgeBtn')?.addEventListener('click', coachNudge);
  }
}

function startCoachTimers() {
  const c = STATE.coach;
  c.lastSpeechMs = Date.now();
  c.monologueStartMs = Date.now();
  c.chipIdx = 0;
  if (c.tickHandle) clearInterval(c.tickHandle);
  if (c.chipHandle) clearInterval(c.chipHandle);
  c.tickHandle = setInterval(refreshCoachPanel, 1000);
  c.chipHandle = setInterval(() => { STATE.coach.chipIdx++; }, 20000);
}

function stopCoachTimers() {
  const c = STATE.coach;
  if (c.tickHandle) { clearInterval(c.tickHandle); c.tickHandle = null; }
  if (c.chipHandle) { clearInterval(c.chipHandle); c.chipHandle = null; }
  c.monologueStartMs = 0;
  refreshCoachPanel();
}

function coachOnSpeech() {
  const c = STATE.coach;
  const now = Date.now();
  if (c.lastSpeechMs && (now - c.lastSpeechMs) > 2000) { c.monologueStartMs = now; }
  if (!c.monologueStartMs) c.monologueStartMs = now;
  c.lastSpeechMs = now;
}

async function coachNudge() {
  if (STATE.coach.nudgeBusy) return;
  const transcript = (STATE.currentTranscript || '').trim();
  if (!transcript) { toast('Nothing said yet to coach on', 'error'); return; }
  const leadId = document.getElementById('callLeadSelect')?.value || STATE.currentCallLeadId;
  const lead = STATE.leads.find(l => l.id === leadId);
  STATE.coach.nudgeBusy = true;
  refreshCoachPanel();
  try {
    const data = await backendCall('coachChat', {
      question: 'I am MID-CALL right now. Based on the transcript so far, give me ONE short, specific thing to say or ask next to move this forward. One or two sentences, ready to say out loud. No preamble.',
      history: [],
      transcript,
      analysis: {},
      coaching: null,
      companyName: lead?.companyName || '',
      sector: lead?.sector || '',
      companyContext: buildAIContext(),
      sectorBrief: lead ? sectorBrief(lead.sector) : ''
    });
    STATE.coach.nudgeBusy = false;
    refreshCoachPanel();
    const out = document.getElementById('coachNudgeOut');
    if (out) out.innerHTML = `<div class="coach-nudge-out">${escapeHtml(data.reply || '(no suggestion)')}</div>`;
  } catch(e) {
    STATE.coach.nudgeBusy = false;
    refreshCoachPanel();
    const out = document.getElementById('coachNudgeOut');
    if (out) out.innerHTML = `<div class="coach-nudge-out" style="color:var(--rose);">${escapeHtml(e.message)}</div>`;
  }
}

function setupRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return null;
  const rec = new SR();
  rec.continuous = true;
  rec.interimResults = true;
  rec.lang = 'en-GB';
  rec.onresult = (event) => {
    let interim = '';
    let final = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const transcript = event.results[i][0].transcript;
      if (event.results[i].isFinal) final += transcript + ' ';
      else interim += transcript;
    }
    if (final) {
      STATE.currentTranscript += final;
      STATE.interimTranscript = '';
    } else {
      STATE.interimTranscript = interim;
    }
    coachOnSpeech();
    const box = document.getElementById('transcriptBox');
    if (box) {
      box.innerHTML = escapeHtml(STATE.currentTranscript) + (STATE.interimTranscript ? `<span class="interim">${escapeHtml(STATE.interimTranscript)}</span>` : '');
      box.scrollTop = box.scrollHeight;
    }
  };
  rec.onerror = (e) => {
    if (e.error !== 'no-speech' && e.error !== 'aborted') {
      toast('Recognition error: ' + e.error, 'error');
    }
  };
  rec.onend = () => {
    if (STATE.recording) {
      // Auto-restart unless user stopped
      try { rec.start(); } catch(e) {}
    }
  };
  return rec;
}

function toggleRecording() {
  if (!STATE.recognition) {
    STATE.recognition = setupRecognition();
    if (!STATE.recognition) { toast('Speech recognition not supported', 'error'); return; }
  }
  if (STATE.recording) {
    STATE.recording = false;
    try { STATE.recognition.stop(); } catch(e){}
    stopCoachTimers();
    render();
  } else {
    STATE.recording = true;
    STATE.currentTranscript = '';
    STATE.interimTranscript = '';
    try { STATE.recognition.start(); } catch(e) { toast('Could not start: ' + e.message, 'error'); STATE.recording = false; }
    render();
    startCoachTimers();
  }
}

async function analyseAndSaveCall() {
  const box = document.getElementById('transcriptBox');
  const transcript = box.innerText.trim();
  if (!transcript) { toast('Nothing to analyse', 'error'); return; }
  if (STATE.recording) toggleRecording();

  const leadId = document.getElementById('callLeadSelect').value;
  const lead = STATE.leads.find(l => l.id === leadId);

  document.getElementById('analysisResult').innerHTML = `<div class="empty"><span class="spinner"></span><div class="serif" style="margin-top:12px;">Analysing the call…</div></div>`;

  try {
    const data = await backendCall('analyseCall', {
      transcript,
      companyName: lead?.companyName || '',
      sector: lead?.sector || '',
      companyContext: buildAIContext(),
      sectorBrief: lead ? sectorBrief(lead.sector) : '',
      coaching: true            // ask the backend to also return the sales-tutor critique
    });
    const a = data.analysis || {};
    const call = {
      id: 'C' + Date.now(),
      leadId: leadId || null,
      date: new Date().toISOString(),
      transcript,
      summary: a.summary || '',
      sentiment: a.sentiment || 'neutral',
      keyPoints: a.keyPoints || [],
      objections: a.objections || [],
      cta: a.cta || '',
      nextSteps: a.nextSteps || [],
      suggestedStatus: a.suggestedStatus || null,
      coaching: data.coaching || a.coaching || null   // expert sales-tutor feedback
    };
    STATE.calls.push(call);
    saveLocal();
    await pushCall(call);

    // Update lead if linked
    if (lead) {
      lead.updated = new Date().toISOString();
      if (a.suggestedStatus && STAGES.find(s => s.key === a.suggestedStatus)) {
        lead.status = a.suggestedStatus;
        lead.stageHistory = lead.stageHistory || [];
        lead.stageHistory.push({ stage: a.suggestedStatus, date: new Date().toISOString(), note: 'After call' });
      } else if (lead.status === 'Initial Contact' || lead.status === 'BANT') {
        lead.status = 'Call Made';
        lead.stageHistory.push({ stage: 'Call Made', date: new Date().toISOString() });
      }
      saveLocal();
      await pushLead(lead);
    }

    STATE.currentTranscript = '';
    document.getElementById('analysisResult').innerHTML = renderAnalysis(a, lead, call);
    toast('Call analysed & saved', 'success');
  } catch(e) {
    document.getElementById('analysisResult').innerHTML = `<div class="card" style="border-color:var(--rose);"><strong style="color:var(--rose);">Analysis failed</strong><div style="margin-top:8px;">${escapeHtml(e.message)}</div></div>`;
    toast(e.message, 'error');
  }
}

        <div>
          <div class="card-title">Call analysis</div>
          <div class="card-sub">${lead ? 'Linked to ' + escapeHtml(lead.companyName) : 'No lead linked'} · ${fmtDateTime(call.date)}</div>

/* ============================================================
   SALES TUTOR — hub page (menu entry)
   ============================================================ */
// A roll-up of every scored call: average score, recent trend, the
// weakest recurring aspects, and an expandable list of each critique
// with its coach chat. Reuses renderCoaching() and renderCoachChat()
// so nothing new is asked of the backend.

// Which aspect sub-objects the backend may attach to a coaching result,
// paired with the human label used on the hub.
const TUTOR_ASPECTS = [
  ['opening', 'Opening & rapport'],
  ['discovery', 'Discovery & questioning'],
  ['pitch', 'Pitch & value framing'],
  ['objectionHandling', 'Objection handling'],
  ['listening', 'Listening & talk ratio'],
  ['closing', 'Closing & next step']
];

// Returns true if a call carries a structured coaching object with a numeric score.
function callHasTutorScore(c) {
  return c && c.coaching && typeof c.coaching === 'object' && typeof c.coaching.score === 'number';
}

function tutorScoreColour(s) {
  if (typeof s !== 'number') return 'var(--ink-muted)';
  return s >= 7 ? 'var(--emerald)' : s >= 4 ? 'var(--gold)' : 'var(--rose)';
}

function renderTutor() {
  // Respect the Mine/All implicit filter the rest of the app uses: a call's
  // "owner" is the linked lead's owner. With no current user, show everything.
  const scored = STATE.calls
    .filter(callHasTutorScore)
    .map(c => {
      const lead = STATE.leads.find(l => l.id === c.leadId) || null;
      return { call: c, lead };
    })
    .filter(({ lead }) => !STATE.currentUser || !lead || lead.owner === STATE.currentUser)
    .sort((a, b) => new Date(b.call.date) - new Date(a.call.date));

  const head = `
    <div class="page-head">
      <div>
        <h1 class="page-title">Sales <em>tutor</em></h1>
        <p class="page-sub">Every call the tutor has scored, in one place. Track your average, spot recurring weak spots, and reopen any critique to ask the coach follow-ups.</p>
      </div>
      <div class="page-actions">
        <button class="btn btn-ghost" onclick="syncFromBackend().then(render)">↻ Sync</button>
        <button class="btn btn-accent" onclick="nav('listener')">🎙 New call</button>
      </div>
    </div>`;

  if (scored.length === 0) {
    return head + renderTutorCoachBox() + `
      <div class="card"><div class="empty">
        <div class="serif">No scored calls yet</div>
        <div style="margin-top:8px; max-width:440px; margin-left:auto; margin-right:auto;">
          Record or paste a call on the Call Listener and hit <strong>Analyse &amp; Save</strong>.
          The tutor scores it automatically and it'll show up here.
          If your calls are analysed but never scored, the Apps Script <code>analyseCall</code>
          action still needs the coaching prompt wired in.
        </div>
        <button class="btn btn-accent" style="margin-top:16px;" onclick="nav('listener')">Go to Call Listener</button>
      </div></div>`;
  }

  // ---- Aggregate stats ----
  const scores = scored.map(s => s.call.coaching.score);
  const avg = scores.reduce((a, b) => a + b, 0) / scores.length;
  const best = Math.max(...scores);

  // Trend: average of the most recent 5 vs the previous 5 (chronological).
  const chrono = [...scored].reverse(); // oldest → newest
  const recent5 = chrono.slice(-5).map(s => s.call.coaching.score);
  const prev5 = chrono.slice(-10, -5).map(s => s.call.coaching.score);
  const recentAvg = recent5.length ? recent5.reduce((a, b) => a + b, 0) / recent5.length : null;
  const prevAvg = prev5.length ? prev5.reduce((a, b) => a + b, 0) / prev5.length : null;
  let trendHtml = '<span class="stat-foot">not enough history yet</span>';
  if (recentAvg !== null && prevAvg !== null) {
    const delta = recentAvg - prevAvg;
    const up = delta >= 0;
    trendHtml = `<span class="stat-foot" style="color:${up ? 'var(--emerald)' : 'var(--rose)'};">${up ? '▲' : '▼'} ${Math.abs(delta).toFixed(1)} vs previous 5</span>`;
  }

  // Weakest aspects across all scored calls (lowest average wins the "focus" spot).
  const aspectAgg = {};
  TUTOR_ASPECTS.forEach(([key]) => { aspectAgg[key] = { sum: 0, n: 0 }; });
  scored.forEach(({ call }) => {
    TUTOR_ASPECTS.forEach(([key]) => {
      const a = call.coaching[key];
      if (a && typeof a.score === 'number') { aspectAgg[key].sum += a.score; aspectAgg[key].n++; }
    });
  });
  const aspectAvgs = TUTOR_ASPECTS
    .map(([key, label]) => ({ key, label, avg: aspectAgg[key].n ? aspectAgg[key].sum / aspectAgg[key].n : null, n: aspectAgg[key].n }))
    .filter(a => a.avg !== null)
    .sort((a, b) => a.avg - b.avg);

  const focusHtml = aspectAvgs.length ? `
    <div class="card" style="margin-bottom:24px;">
      <div class="card-head">
        <div>
          <div class="card-title">Where you score lowest</div>
          <div class="card-sub">Averaged across ${scored.length} scored call${scored.length === 1 ? '' : 's'} · your biggest lever is at the top</div>
        </div>
      </div>
      ${aspectAvgs.map(a => {
        const col = tutorScoreColour(a.avg);
        const pct = (a.avg / 10) * 100;
        return `
          <div style="margin-bottom:14px;">
            <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:4px;">
              <strong style="font-size:12px; text-transform:uppercase; letter-spacing:0.04em;">${escapeHtml(a.label)}</strong>
              <span class="mono" style="font-size:12px; color:${col}; font-weight:600;">${a.avg.toFixed(1)}/10</span>
            </div>
            <div style="background:var(--bg-sunken); height:6px; border-radius:3px; overflow:hidden;"><div style="background:${col}; height:100%; width:${pct}%;"></div></div>
          </div>`;
      }).join('')}
    </div>` : '';

  // ---- Per-call list (expandable inline) ----
  const expanded = STATE._tutorExpanded || {};
  const listHtml = scored.map(({ call, lead }) => {
    const c = call.coaching;
    const col = tutorScoreColour(c.score);
    const isOpen = !!expanded[call.id];
    return `
      <div class="card" style="margin-bottom:14px; border-left:3px solid ${col};">
        <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:16px; cursor:pointer;" onclick="toggleTutorCall('${call.id}')">
          <div style="flex:1; min-width:0;">
            <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
              <strong style="font-size:15px;">${escapeHtml(lead ? lead.companyName : 'Untagged call')}</strong>
              <span class="pill" style="background:var(--gold-soft); border-color:${col}; color:${col}; font-weight:600;">${c.score}/10</span>
              ${c.score === best ? '<span class="pill" style="background:var(--emerald-soft); border-color:var(--emerald); color:var(--emerald);">Your best</span>' : ''}
            </div>
            <div style="font-size:12px; color:var(--ink-muted); margin-top:4px;">
              ${fmtDateTime(call.date)}${lead && lead.contactName ? ' · ' + escapeHtml(lead.contactName) : ''}${lead && lead.sector ? ' · ' + escapeHtml((lead.sector || '').split('—')[0].trim()) : ''}
            </div>
            ${c.headline ? `<div style="font-size:13px; color:var(--ink-soft); margin-top:8px; line-height:1.5;">${escapeHtml(c.headline)}</div>` : ''}
          </div>
          <span class="mono" style="font-size:18px; color:var(--ink-muted); flex-shrink:0;">${isOpen ? '−' : '+'}</span>
        </div>
        ${isOpen ? `<div style="margin-top:4px;">${renderCoaching(c)}${renderCoachChat(call)}${lead ? `<button class="btn btn-ghost" style="margin-top:12px;" onclick="openLead('${lead.id}')">Open ${escapeHtml(lead.companyName)} →</button>` : ''}</div>` : ''}
      </div>`;
  }).join('');

  return head + renderTutorCoachBox() + `

// A general sales-coach chat that isn't tied to any one call. Uses the
// same backend coachChat action (which accepts a call-free request), so
// no Apps Script change is needed. History is kept in _coachChats under a
// reserved key so it survives re-renders within the session.
const TUTOR_COACH_KEY = '__tutor_general__';

function renderTutorCoachBox() {
  const history = STATE._coachChats[TUTOR_COACH_KEY] || [];
  const suggestions = [
    'Help me prep for a cold call with a HACCP-certified bakery',
    'Role-play the "we already do training in English" objection',
    'Draft an opener for a HIQA homecare provider',
    'What questions uncover compliance pain on a first call?'
  ];
  return `
    <div class="card" id="tutorCoachBox" style="margin-bottom:24px; border-left:3px solid var(--blue);">
      <div class="card-head">
        <div>
          <div class="card-title">Ask the coach</div>
          <div class="card-sub">A general sales coach — prep a call, role-play an objection, sharpen a pitch. No call needed.</div>
        </div>
        ${history.length ? `<button class="btn btn-ghost" onclick="clearTutorCoach()">Clear</button>` : ''}
      </div>

      <div id="tutorCoachLog" style="display:flex; flex-direction:column; gap:10px; margin-bottom:14px;">
        ${history.length === 0 ? `
          <div style="font-size:13px; color:var(--ink-muted); line-height:1.6;">
            Ask anything about selling into your sectors. For example:
          </div>
          <div style="display:flex; flex-wrap:wrap; gap:6px; margin-top:2px;">
            ${suggestions.map(s => `<button class="btn btn-ghost" style="font-size:12px; padding:6px 10px; text-align:left;" onclick="tutorCoachSuggest(this)">${escapeHtml(s)}</button>`).join('')}
          </div>
        ` : history.map(m => coachBubble(m)).join('')}
      </div>

      <div style="display:flex; gap:8px; align-items:flex-end;">
        <textarea class="textarea" id="tutorCoachInput" placeholder="Ask the coach…" style="min-height:44px; resize:vertical;" onkeydown="tutorCoachKeydown(event)"></textarea>
        <button class="btn btn-primary" id="tutorCoachSend" onclick="sendTutorCoach()" style="white-space:nowrap;">Ask →</button>
      </div>
    </div>`;
}

function tutorCoachSuggest(btn) {
  const input = document.getElementById('tutorCoachInput');
  if (input) input.value = btn.textContent;
  sendTutorCoach();
}

function tutorCoachKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendTutorCoach();
  }
}

function clearTutorCoach() {
  STATE._coachChats[TUTOR_COACH_KEY] = [];
  render();
}

function refreshTutorCoachLog() {
  const log = document.getElementById('tutorCoachLog');
  if (!log) return;
  const history = STATE._coachChats[TUTOR_COACH_KEY] || [];
  log.innerHTML = history.map(m => coachBubble(m)).join('');
  log.scrollTop = log.scrollHeight;
}

async function sendTutorCoach() {
  const input = document.getElementById('tutorCoachInput');
  const sendBtn = document.getElementById('tutorCoachSend');
  if (!input) return;
  const question = input.value.trim();
  if (!question) return;

  STATE._coachChats[TUTOR_COACH_KEY] = STATE._coachChats[TUTOR_COACH_KEY] || [];
  STATE._coachChats[TUTOR_COACH_KEY].push({ role: 'user', text: question });
  input.value = '';
  if (sendBtn) { sendBtn.disabled = true; sendBtn.textContent = 'Thinking…'; }

  const log = document.getElementById('tutorCoachLog');
  if (log) {
    log.innerHTML = STATE._coachChats[TUTOR_COACH_KEY].map(m => coachBubble(m)).join('') +
      `<div style="display:flex; justify-content:flex-start;">
         <div style="padding:10px 14px; border-radius:10px 10px 10px 2px; background:var(--bg-sunken); border:1px solid var(--line);">
           <span class="spinner" style="width:14px; height:14px;"></span>
         </div>
       </div>`;
    log.scrollTop = log.scrollHeight;
  }

  try {
    // Call-free coach request: no transcript/analysis, just company + sector context.
    const data = await backendCall('coachChat', {
      question,
      history: STATE._coachChats[TUTOR_COACH_KEY].slice(0, -1),
      transcript: '',
      analysis: {},
      coaching: null,
      companyName: '',
      sector: '',
      companyContext: buildAIContext(),
      sectorBrief: ''
    });
    const reply = (data.reply || data.answer || '').trim() ||
      'No reply came back. The backend may need the coachChat action added.';
    STATE._coachChats[TUTOR_COACH_KEY].push({ role: 'assistant', text: reply });
  } catch (e) {
    STATE._coachChats[TUTOR_COACH_KEY].push({
      role: 'assistant',
      text: 'Coach chat failed: ' + e.message +
        '\n\n(If this says the action is unknown, the Apps Script needs the coachChat handler added.)'
    });
  } finally {
    if (sendBtn) { sendBtn.disabled = false; sendBtn.textContent = 'Ask →'; }
    refreshTutorCoachLog();
  }
}

// Renders the coaching block. Accepts the structured coaching object
// returned by the backend (analyseCall with coaching:true). Degrades
// quietly to an explanatory note if the backend hasn't been upgraded yet.
function renderCoaching(c) {
  if (!c) {
    return `
      <div class="card" style="margin-top:20px; border-style:dashed;">
        <div class="card-head">
          <div>
            <div class="card-title">Sales tutor</div>
            <div class="card-sub">No coaching returned for this call</div>
          </div>
        </div>
        <div style="font-size:13px; color:var(--ink-soft); line-height:1.6;">
          The tutor runs on the backend alongside call analysis. If you're not seeing
          feedback, the Apps Script <code>analyseCall</code> action needs the coaching
          prompt added (see the snippet shipped with this update).
        </div>
      </div>`;
  }
  // Coaching may arrive as a plain string (older/simple backends) or structured.
  if (typeof c === 'string') {
    return `
      <div class="card" style="margin-top:20px; border-left:3px solid var(--gold);">
        <div class="card-head"><div><div class="card-title">Sales tutor</div>
        <div class="card-sub">Expert critique of this call</div></div></div>
        <div style="white-space:pre-wrap; font-size:13px; line-height:1.7;">${escapeHtml(c)}</div>
      </div>`;
  }

  const score = (typeof c.score === 'number') ? Math.max(0, Math.min(10, c.score)) : null;
  const scoreColour = score === null ? 'var(--ink-muted)'
    : score >= 7 ? 'var(--emerald)'
    : score >= 4 ? 'var(--gold)'
    : 'var(--rose)';

  // A scored aspect: { aspect, score, comment }
  const aspectRow = (label, obj) => {
    if (!obj) return '';
    const s = (typeof obj.score === 'number') ? obj.score : null;
    const col = s === null ? 'var(--ink-muted)' : s >= 7 ? 'var(--emerald)' : s >= 4 ? 'var(--gold)' : 'var(--rose)';
    const pct = s === null ? 0 : (s / 10) * 100;
    return `
      <div style="margin-bottom:14px;">
        <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:4px;">
          <strong style="font-size:12px; text-transform:uppercase; letter-spacing:0.04em;">${escapeHtml(label)}</strong>
          <span class="mono" style="font-size:12px; color:${col}; font-weight:600;">${s === null ? '—' : s + '/10'}</span>
        </div>
        ${s !== null ? `<div style="background:var(--bg-sunken); height:6px; border-radius:3px; overflow:hidden; margin-bottom:6px;"><div style="background:${col}; height:100%; width:${pct}%;"></div></div>` : ''}
        ${obj.comment ? `<div style="font-size:13px; color:var(--ink-soft); line-height:1.6;">${escapeHtml(obj.comment)}</div>` : ''}
      </div>`;
  };

  // Map of the call aspects an expert would assess.
  const aspectDefs = [
    ['Opening & rapport',     c.opening],
    ['Discovery & questioning', c.discovery],
    ['Pitch & value framing', c.pitch],
    ['Objection handling',    c.objectionHandling],
    ['Listening & talk ratio', c.listening],
    ['Closing & next step',   c.closing]
  ];
  const aspectsHtml = aspectDefs.map(([label, obj]) => aspectRow(label, obj)).filter(Boolean).join('');

  const listBlock = (title, items, colour) =>
    (items && items.length) ? `
      <div class="research-section"><h4>${escapeHtml(title)}</h4>
      <ul>${items.map(i => `<li${colour ? ` style="color:${colour};"` : ''}>${escapeHtml(i)}</li>`).join('')}</ul></div>` : '';

  return `
    <div class="card" style="margin-top:20px; border-left:3px solid var(--gold);">
      <div class="card-head">
        <div>
          <div class="card-title">Sales tutor</div>
          <div class="card-sub">Expert critique — how this call could close faster</div>
        </div>
        ${score !== null ? `<span class="pill" style="background:var(--gold-soft); color:${scoreColour}; border-color:${scoreColour}; font-weight:600;">Overall ${score}/10</span>` : ''}
      </div>

      ${c.headline ? `<p style="font-size:14px; line-height:1.6; margin-bottom:16px;"><strong>${escapeHtml(c.headline)}</strong></p>` : ''}

      ${aspectsHtml ? `<div style="margin-bottom:8px;">${aspectsHtml}</div>` : ''}

      ${listBlock('What worked', c.strengths, 'var(--emerald)')}
      ${listBlock('What to fix', c.improvements, 'var(--accent)')}
      ${listBlock('Missed opportunities', c.missed)}

      ${c.betterLines && c.betterLines.length ? `
        <div class="research-section"><h4>Lines to use next time</h4>
        ${c.betterLines.map(b => `
          <div style="background:var(--bg-sunken); border-left:2px solid var(--gold); padding:10px 12px; border-radius:0 6px 6px 0; margin-bottom:8px; font-size:13px; line-height:1.6;">
            ${b.context ? `<div style="font-size:11px; text-transform:uppercase; letter-spacing:0.04em; color:var(--ink-muted); margin-bottom:4px;">${escapeHtml(b.context)}</div>` : ''}
            <em>"${escapeHtml(b.line || b)}"</em>
          </div>`).join('')}
        </div>` : ''}

      ${c.coachNextCall ? `<div class="research-section"><h4>One thing for the next call</h4>
        <p style="background:var(--gold-soft); padding:12px; border-radius:6px; color:var(--ink);"><strong>${escapeHtml(c.coachNextCall)}</strong></p></div>` : ''}
    </div>`;
}

// Renders an interactive chat panel under the analysis. The whole call
// (transcript + analysis + coaching) is sent as context with each
// question, so the coach can answer follow-ups and help prep the next call.
function renderCoachChat(call) {
  if (!call || !call.id) return '';
  const history = STATE._coachChats[call.id] || [];
  const suggestions = [
    'Why did this call score the way it did?',
    'Draft an opening for my next call with them',
    'How should I handle their main objection next time?',
    'What should my one goal be for the follow-up?'
  ];

  return `
    <div class="card" id="coachChat-${call.id}" style="margin-top:20px; border-left:3px solid var(--blue);">
      <div class="card-head">
        <div>
          <div class="card-title">Ask the coach</div>
          <div class="card-sub">Questions about this call, or help prepping the next one</div>
        </div>
      </div>

      <div id="coachChatLog-${call.id}" style="display:flex; flex-direction:column; gap:10px; margin-bottom:14px;">
        ${history.length === 0 ? `
          <div style="font-size:13px; color:var(--ink-muted); line-height:1.6;">
            Ask anything about the call above. For example:
          </div>
          <div style="display:flex; flex-wrap:wrap; gap:6px; margin-top:2px;">
            ${suggestions.map(s => `<button class="btn btn-ghost" style="font-size:12px; padding:6px 10px;" onclick="coachChatSuggest('${call.id}', this)">${escapeHtml(s)}</button>`).join('')}
          </div>
        ` : history.map(m => coachBubble(m)).join('')}
      </div>

      <div style="display:flex; gap:8px; align-items:flex-end;">
        <textarea class="textarea" id="coachChatInput-${call.id}" placeholder="Ask the coach…" style="min-height:44px; resize:vertical;" onkeydown="coachChatKeydown(event, '${call.id}')"></textarea>
        <button class="btn btn-primary" id="coachChatSend-${call.id}" onclick="sendCoachChat('${call.id}')" style="white-space:nowrap;">Ask →</button>
      </div>
    </div>`;
}

// A single chat bubble.
function coachBubble(m) {
  const isUser = m.role === 'user';
  return `
    <div style="display:flex; ${isUser ? 'justify-content:flex-end;' : 'justify-content:flex-start;'}">
      <div style="max-width:82%; padding:10px 14px; border-radius:${isUser ? '10px 10px 2px 10px' : '10px 10px 10px 2px'}; font-size:13px; line-height:1.65; white-space:pre-wrap;
        background:${isUser ? 'var(--ink)' : 'var(--bg-sunken)'}; color:${isUser ? 'var(--bg)' : 'var(--ink)'};
        ${isUser ? '' : 'border:1px solid var(--line);'}">
        ${escapeHtml(m.text)}
      </div>
    </div>`;
}

// Drop a suggested prompt into the box and send it.
function coachChatSuggest(callId, btn) {
  const input = document.getElementById('coachChatInput-' + callId);
  if (input) input.value = btn.textContent;
  sendCoachChat(callId);
}

// Enter to send, Shift+Enter for newline.
function coachChatKeydown(e, callId) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendCoachChat(callId);
  }
}

// Re-render just the chat log for a call (keeps the rest of the page stable).
function refreshCoachChatLog(callId) {
  const call = STATE.calls.find(c => c.id === callId);
  if (!call) return;
  const log = document.getElementById('coachChatLog-' + callId);
  if (!log) return;
  const history = STATE._coachChats[callId] || [];
  log.innerHTML = history.map(m => coachBubble(m)).join('');
  log.scrollTop = log.scrollHeight;
}

async function sendCoachChat(callId) {
  const input = document.getElementById('coachChatInput-' + callId);
  const sendBtn = document.getElementById('coachChatSend-' + callId);
  if (!input) return;
  const question = input.value.trim();
  if (!question) return;

  const call = STATE.calls.find(c => c.id === callId);
  if (!call) { toast('Call not found', 'error'); return; }
  const lead = call.leadId ? STATE.leads.find(l => l.id === call.leadId) : null;

  // Push the user's message and a pending assistant placeholder.
  STATE._coachChats[callId] = STATE._coachChats[callId] || [];
  STATE._coachChats[callId].push({ role: 'user', text: question });
  input.value = '';
  if (sendBtn) { sendBtn.disabled = true; sendBtn.textContent = 'Thinking…'; }

  // Render user message + a temporary "typing" bubble.
  const log = document.getElementById('coachChatLog-' + callId);
  if (log) {
    log.innerHTML = STATE._coachChats[callId].map(m => coachBubble(m)).join('') +
      `<div id="coachChatPending-${callId}" style="display:flex; justify-content:flex-start;">
         <div style="padding:10px 14px; border-radius:10px 10px 10px 2px; background:var(--bg-sunken); border:1px solid var(--line);">
           <span class="spinner" style="width:14px; height:14px;"></span>
         </div>
       </div>`;
    log.scrollTop = log.scrollHeight;
  }

  try {
    const data = await backendCall('coachChat', {
      question,
      // Prior turns minus the one we just added, so the backend sees the conversation.
      history: STATE._coachChats[callId].slice(0, -1),
      transcript: call.transcript || '',
      analysis: {
        summary: call.summary, sentiment: call.sentiment,
        keyPoints: call.keyPoints, objections: call.objections,
        cta: call.cta, nextSteps: call.nextSteps
      },
      coaching: call.coaching || null,
      companyName: lead?.companyName || call.companyName || '',
      sector: lead?.sector || '',
      companyContext: buildAIContext(),
      sectorBrief: lead ? sectorBrief(lead.sector) : ''
    });
    const reply = (data.reply || data.answer || '').trim() ||
      'No reply came back. The backend may need the coachChat action added.';
    STATE._coachChats[callId].push({ role: 'assistant', text: reply });
  } catch (e) {
    STATE._coachChats[callId].push({
      role: 'assistant',
      text: 'Coach chat failed: ' + e.message +
        '\n\n(If this says the action is unknown, the Apps Script needs the coachChat handler added.)'
    });
  } finally {
    if (sendBtn) { sendBtn.disabled = false; sendBtn.textContent = 'Ask →'; }
    refreshCoachChatLog(callId);
  }
}

function buildAIContext() {
  // Builds the system-prompt context string from the current playbook.
  // Sent with every AI call so the model always knows the product, pricing, and ICP.
  const pb = STATE.config.playbook;
  if (!pb || !pb.companyName) return '';
  return JSON.stringify({
    companyName: pb.companyName,
    website: pb.website,
    oneLiner: pb.oneLiner,
    primaryContact: pb.primaryContact,
    secondaryContact: pb.secondaryContact,
    region: pb.region,
    pricing: pb.pricing,
    nextStepCta: pb.nextStepCta,
    livingProof: pb.livingProof
  });
}

function sectorBrief(sectorName) {
  // Returns the sector-specific brief text, or empty string if no match.
  const pb = STATE.config.playbook;
  if (!pb || !pb.sectors) return '';
  return pb.sectors[sectorName] || '';
}

function savePlaybookFromForm() {
  const pb = STATE.config.playbook || JSON.parse(JSON.stringify(DEFAULT_PLAYBOOK));
  // Top-level fields
  document.querySelectorAll('[data-pb]').forEach(el => {
    pb[el.dataset.pb] = el.value;
  });
  // Sector renames (key-input pairs)
  const newSectors = {};
  document.querySelectorAll('[data-pb-sector]').forEach(textarea => {
    const oldKey = textarea.dataset.pbSector;
    const keyInput = document.querySelector(`[data-pb-sector-key="${CSS.escape(oldKey)}"]`);
    const newKey = (keyInput?.value || oldKey).trim();
    if (newKey) newSectors[newKey] = textarea.value;
  });
  pb.sectors = newSectors;
  STATE.config.playbook = pb;
  saveLocal();
  // Push to backend (best effort)
  if (STATE.config.appsScriptUrl) {
    backendCall('savePlaybook', { playbook: pb })
      .then(() => toast('Playbook saved & synced', 'success'))
      .catch(e => { enqueuePush('savePlaybook', { playbook: pb }); toast('Saved locally: sync queued for retry', 'error'); });
  } else {
    toast('Playbook saved locally', 'success');
  }
  render();
}

function resetPlaybook() {
  openModal(`
    <div class="modal-head"><h3 class="serif" style="font-size:24px;">Reset playbook to default?</h3><button class="btn btn-ghost" onclick="closeModal()">×</button></div>
    <div class="modal-body">This restores the original CertifiedIQ Customer Value Brief. Any edits you've made will be lost.</div>

function doResetPlaybook() {

}

function addSectorBrief() {

function removeSectorBrief(key) {

function wipeLocal() {
  const url = STATE.config.appsScriptUrl;
  STATE.leads = []; STATE.calls = []; STATE.activities = [];

  closeModal();
